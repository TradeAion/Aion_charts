<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- Without this, mobile browsers lay the page out at a 980px virtual width and then
     scale it down to the device, squishing the UI and adding a fractional CSS scale on top
     of the canvas bitmap. user-scalable=no stops native pinch-zoom fighting the chart. -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Aion Charts — @aion/charts demo</title>
<style>
  html, body { margin: 0; height: 100%; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif; }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  #bar { padding: 8px 12px; font-size: 13px; color: #191919; border-bottom: 1px solid #e0e3eb; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  /* The library creates and manages the canvases inside this container. */
  #chart_container { flex: 1; position: relative; touch-action: none; overscroll-behavior: none; }
  #status { color: #787b86; }
  /* crosshair-move legend (top-left, over the pane) driven by subscribe_crosshair_move */
  #legend { position: absolute; top: 8px; left: 8px; z-index: 3; font-size: 12px; color: #191919;
            background: rgba(255,255,255,0.7); padding: 3px 7px; border-radius: 3px; pointer-events: none;
            font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <strong style="background:#26a69a;color:#fff;padding:2px 6px;border-radius:3px">@aion/charts</strong>
    <span>wheel = zoom &middot; drag = pan &middot; double-click = fit</span>
    <label><input type="radio" name="series" value="candlestick" checked> candles</label>
    <label><input type="radio" name="series" value="bar"> bars</label>
    <label><input type="radio" name="series" value="line"> line</label>
    <label><input type="radio" name="series" value="area"> area</label>
    <label><input type="checkbox" id="sma_toggle"> SMA(20)</label>
    <label>crosshair
      <select id="cross_mode">
        <option value="1" selected>magnet</option>
        <option value="0">normal</option>
        <option value="3">magnet OHLC</option>
        <option value="2">hidden</option>
      </select>
    </label>
    <span id="status"></span>
  </div>
  <div id="chart_container"><div id="legend">O — H — L — C —</div></div>
</div>
<script type="module">
// The real public API — same package a downstream user would `npm install`.
import { create_chart } from "./dist/aion_charts.js";

const container = document.getElementById("chart_container");
const status = document.getElementById("status");

// deterministic random-walk OHLC data (hourly bars ending "now"), as the array-of-objects the
// public API accepts — the library packs it into typed arrays at the boundary.
function generate_data(n) {
  const out = [];
  let seed = 42;
  const rnd = () => (seed = (seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
  let price = 100;
  const hour = 3600;
  const start = Math.floor(Date.now() / 1000 / hour) * hour - (n - 1) * hour;
  for (let i = 0; i < n; i++) {
    const o = price;
    const c = Math.max(1, o + (rnd() - 0.5) * 2.4);
    out.push({ time: start + i * hour, open: o, high: Math.max(o, c) + rnd() * 1.2, low: Math.min(o, c) - rnd() * 1.2, close: c });
    price = c;
  }
  return out;
}

function sma(data, period) {
  const out = [];
  let sum = 0;
  for (let i = 0; i < data.length; i++) {
    sum += data[i].close;
    if (i >= period) sum -= data[i - period].close;
    if (i >= period - 1) out.push({ time: data[i].time, value: sum / period });
  }
  return out;
}

const chart = await create_chart(container, { autoSize: true });
window.__chart = chart; // debug/test handle

const data = generate_data(1000);
const main = chart.add_series("candlestick");
main.set_data(data);
chart.time_scale().fit_content();

let sma_series = null;
const sma_data = sma(data, 20);

status.textContent = `1000 bars · dpr ${(window.devicePixelRatio || 1).toFixed(3)}`;

document.getElementById("sma_toggle").addEventListener("change", (e) => {
  if (e.target.checked && sma_series === null) {
    sma_series = chart.add_series("line", { color: "#ff9800" });
    sma_series.set_data(sma_data);
  } else if (!e.target.checked && sma_series !== null) {
    sma_series.set_data([]); // no remove_series yet — hide by clearing
    sma_series = null;
  }
});

document.querySelectorAll('input[name="series"]').forEach((el) => {
  el.addEventListener("change", () => main.set_type(el.value));
});
document.getElementById("cross_mode").addEventListener("change", (e) => {
  chart.apply_options({ crosshair: { mode: Number(e.target.value) } });
});

// crosshair-move subscription → OHLC legend (the public event API)
const legend = document.getElementById("legend");
const fmt = (v) => (v === undefined ? "—" : v.toFixed(2));
chart.subscribe_crosshair_move((params) => {
  const bar = params.series_data.get(main);
  if (!bar || params.point === null) { legend.textContent = "O — H — L — C —"; return; }
  legend.textContent = `O ${fmt(bar.open)}  H ${fmt(bar.high)}  L ${fmt(bar.low)}  C ${fmt(bar.close)}`;
});
chart.subscribe_click((params) => {
  if (params.time !== null) console.log("aion click @", new Date(params.time * 1000).toISOString());
});
</script>
</body>
</html>
