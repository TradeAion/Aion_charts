<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- Without this, mobile browsers lay the page out at a 980px virtual width and then
     scale it down to the device, squishing the UI and adding a fractional CSS scale on top
     of the canvas bitmap. user-scalable=no stops native pinch-zoom fighting the chart. -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Aion Charts — @tradeaion/charts demo</title>
<style>
  html, body { margin: 0; height: 100%; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif; }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  #bar { padding: 6px 12px; font-size: 13px; color: #191919; border-bottom: 1px solid #e0e3eb;
         display: flex; gap: 4px 10px; align-items: stretch; flex-wrap: wrap; }
  #bar .group { position: relative; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
                padding: 10px 10px 4px; margin-top: 2px; border: 1px solid #e0e3eb; border-radius: 6px; }
  #bar .group::before { content: attr(data-caption); position: absolute; top: -8px; left: 8px;
                padding: 0 5px; background: #fff; font-size: 9.5px; font-weight: 600; letter-spacing: 0.07em;
                text-transform: uppercase; color: #787b86; }
  #bar label { display: inline-flex; gap: 4px; align-items: center; white-space: nowrap; }
  #bar input[type="color"] { width: 24px; height: 20px; padding: 0; border: 1px solid #d0d3da; border-radius: 3px; background: none; cursor: pointer; }
  #bar input[type="range"] { width: 72px; vertical-align: middle; }
  #bar .brand { align-self: center; background:#26a69a; color:#fff; padding:2px 6px; border-radius:3px; font-weight: bold; }
  #bar .hint { color: #787b86; font-size: 11px; }
  #status { align-self: center; margin-left: auto; color: #787b86; }
  /* The library creates and manages the canvases inside this container. */
  #chart_container { flex: 1; position: relative; touch-action: none; overscroll-behavior: none; }
  /* crosshair-move legend (top-left, over the pane) driven by subscribe_crosshair_move */
  #legend { position: absolute; top: 8px; left: 8px; z-index: 3; font-size: 12px; color: #191919;
            background: rgba(255,255,255,0.7); padding: 3px 7px; border-radius: 3px; pointer-events: none;
            font-variant-numeric: tabular-nums; }
  /* Page chrome follows the chart theme (synced by sync_page_theme below). */
  body[data-theme="dark"] { background: #0a0a0a; }
  body[data-theme="dark"] #bar { background: #0a0a0a; color: #e5e7eb; border-bottom-color: #23262e; }
  body[data-theme="dark"] #bar .group { border-color: #23262e; }
  body[data-theme="dark"] #bar .group::before { background: #0a0a0a; color: #9aa0ac; }
  body[data-theme="dark"] #bar label { color: #e5e7eb; }
  body[data-theme="dark"] #bar select,
  body[data-theme="dark"] #bar input[type="text"] { background: #16191f; color: #e5e7eb; border: 1px solid #2b2f38; border-radius: 3px; }
  body[data-theme="dark"] #bar button { background: #16191f; color: #e5e7eb; border: 1px solid #2b2f38; border-radius: 3px; cursor: pointer; }
  body[data-theme="dark"] #bar input[type="color"] { border-color: #2b2f38; background: #16191f; }
  body[data-theme="dark"] #bar .hint { color: #9aa0ac; }
  body[data-theme="dark"] #status { color: #9aa0ac; }
  body[data-theme="dark"] #legend { color: #e5e7eb; background: rgba(10,10,10,0.7); }
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <span class="brand">@tradeaion/charts</span>

    <div class="group" id="type_group" data-caption="Series">
      <label><input type="radio" name="series" value="candlestick" checked> candles</label>
      <label><input type="radio" name="series" value="bar"> bars</label>
      <label><input type="radio" name="series" value="line"> line</label>
      <label><input type="radio" name="series" value="area"> area</label>
      <label><input type="radio" name="series" value="baseline"> baseline</label>
    </div>

    <!-- candle/bar colors: body, wick, and border per direction + part visibility -->
    <div class="group" id="candle_style" data-caption="Candle style">
      <label>up <input type="color" id="up_color" value="#26a69a"></label>
      <label>down <input type="color" id="down_color" value="#ef5350"></label>
      <label>wick up <input type="color" id="wick_up_color" value="#26a69a"></label>
      <label>wick dn <input type="color" id="wick_down_color" value="#ef5350"></label>
      <label>border up <input type="color" id="border_up_color" value="#26a69a"></label>
      <label>border dn <input type="color" id="border_down_color" value="#ef5350"></label>
      <label><input type="checkbox" id="wick_visible" checked> wicks</label>
      <label><input type="checkbox" id="border_visible" checked> borders</label>
      <button id="candle_parts_reset" type="button" title="Reset wick/border colors to follow the body colors">reset parts</button>
    </div>

    <!-- line/area stroke -->
    <div class="group" id="line_style" data-caption="Line style" hidden>
      <label>color <input type="color" id="line_color" value="#2196f3"></label>
      <label>width <input type="range" id="line_width" min="1" max="8" step="1" value="3"><span id="line_width_val">3</span></label>
    </div>

    <!-- area fill -->
    <div class="group" id="area_style" data-caption="Area style" hidden>
      <label>fill <input type="color" id="area_top" value="#2edc87"></label>
    </div>

    <div class="group" data-caption="Overlays">
      <label><input type="checkbox" id="sma_toggle"> SMA(20)</label>
      <label><input type="checkbox" id="vol_toggle"> volume</label>
    </div>

    <div class="group" data-caption="Plugins">
      <label title="Pane primitive (plugin platform): alternating day shading behind the series"><input type="checkbox" id="bands_toggle"> day bands</label>
      <label title="Series primitive (plugin platform): position band with a price-axis tag on the main series"><input type="checkbox" id="pos_band_toggle"> position band</label>
      <label title="Series primitive (plugin platform): autoscale-expanding band beyond the data"><input type="checkbox" id="scale_band_toggle"> scale band</label>
      <label title="Custom series (plugin platform): the reference rounded-candles plugin example, drawn by the plugin"><input type="checkbox" id="custom_toggle"> rounded candles</label>
      <label title="Built-in plugin (reference createSeriesMarkers): the markers fixture drawn by the plugin platform — A/B against ?feature=markers (engine markers)"><input type="checkbox" id="plugin_markers_toggle"> plugin markers</label>
      <label title="Built-in plugin (reference createTextWatermark): two-line watermark painted through the overlay-text hook"><input type="checkbox" id="plugin_watermark_toggle"> plugin watermark</label>
      <label title="Canvas primitive (plugin platform C-e): the reference vertical-line plugin example, painted with raw Canvas2D calls on the plugin overlay"><input type="checkbox" id="vertline_toggle"> vert line</label>
    </div>

    <div class="group" data-caption="Crosshair">
      <label>mode
        <select id="cross_mode">
          <option value="0" selected>normal</option>
          <option value="1">magnet</option>
          <option value="3">magnet OHLC</option>
          <option value="2">hidden</option>
        </select>
      </label>
      <label>color <input type="color" id="cross_color" value="#9598a1"></label>
      <label>w <input type="range" id="cross_width" min="1" max="4" step="1" value="1"><span id="cross_width_val">1</span></label>
      <label>style
        <select id="cross_style">
          <option value="0">solid</option>
          <option value="1">dotted</option>
          <option value="2">dashed</option>
          <option value="3" selected>large dashed</option>
          <option value="4">sparse dotted</option>
        </select>
      </label>
      <label>label bg <input type="color" id="cross_label_bg" value="#131722"></label>
      <label><input type="checkbox" id="cross_label_visible" checked> labels</label>
    </div>

    <div class="group" data-caption="Chart">
      <label>theme
        <select id="theme_select">
          <option value="light" selected>light</option>
          <option value="dark">dark</option>
        </select>
      </label>
      <label><input type="checkbox" id="grid_toggle" checked> grid</label>
      <label>grid color <input type="color" id="grid_color" value="#d6dcde"></label>
      <label>grid style
        <select id="grid_style">
          <option value="0" selected>solid</option>
          <option value="1">dotted</option>
          <option value="2">dashed</option>
          <option value="3">large dashed</option>
          <option value="4">sparse dotted</option>
        </select>
      </label>
      <label>font
        <select id="font_family">
          <option value="-apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif" selected>system</option>
          <option value="monospace">monospace</option>
          <option value="Georgia, serif">serif</option>
        </select>
      </label>
      <label>size <input type="range" id="font_size" min="9" max="20" step="1" value="12"><span id="font_size_val">12</span></label>
    </div>

    <div class="group" data-caption="Series chrome" title="Built-in last-price line and last-value axis label on the main series (reference defaults: both on; the line follows the bar direction color)">
      <label><input type="checkbox" id="price_line_toggle" checked> price line</label>
      <label><input type="checkbox" id="last_value_toggle" checked> last value</label>
    </div>

    <!-- price/time axis cosmetics: border (reference borderColor/borderVisible) + text (textColor) -->
    <div class="group" data-caption="Axes">
      <label>border <input type="color" id="axis_border_color" value="#f5f5f5"></label>
      <label><input type="checkbox" id="axis_border_visible" checked> borders</label>
      <label>text <input type="color" id="axis_text_color" value="#0a0a0a"></label>
      <label>separator <input type="color" id="pane_separator_color" value="#2b2b43"></label>
    </div>

    <!-- watermark (reference v4 shape) -->
    <div class="group" id="watermark_group" data-caption="Watermark">
      <label><input type="checkbox" id="wm_visible"> show</label>
      <label>text <input type="text" id="wm_text" value="AION" size="6"></label>
      <label>color <input type="color" id="wm_color" value="#b0b8c4"></label>
      <label>size <input type="range" id="wm_size" min="16" max="160" step="4" value="72"><span id="wm_size_val">72</span></label>
    </div>

    <!-- interaction toggles: axis drag-to-scale, mouse kinetic (off by default, reference parity) -->
    <div class="group" id="interaction_group" data-caption="Interaction" title="Drag a price/time axis to scale it; keyboard: arrows pan (Ctrl = fast), +/- zoom, Home fit, Esc clear">
      <label><input type="checkbox" id="axis_scale_toggle" checked> axis drag-scale</label>
      <label><input type="checkbox" id="kinetic_toggle"> mouse kinetic</label>
      <span class="hint">drag axes · Ctrl+←→ fast scroll · flick coasts on touch</span>
    </div>

    <span id="status"></span>
  </div>
  <div id="chart_container"><div id="legend">O — H — L — C —</div></div>
</div>
<script type="module">
// Built from the real package distribution. The demo build copies @tradeaion/charts' published
// artifacts; it does not compile or wire an engine of its own.
import { create_chart, create_series_markers, create_text_watermark, theme_options, theme_palette } from "./dist/aion_charts.js";
import { generate_fixture_data } from "./fixture_data.js";
import { fixture_theme } from "./fixture_styles.js";
import { marker_fixture, volume_fixture } from "./fixture_features.js";
import { rounded_candles_pane_view } from "./fixture_custom_series.js";
import { vert_line_canvas_primitive } from "./fixture_canvas_plugin.js";

const container = document.getElementById("chart_container");
const status = document.getElementById("status");

// Deterministic random-walk OHLC data, as the array-of-objects the public API accepts — the
// library packs it into typed arrays at the boundary. Runtime fixtures pin the final timestamp so
// golden output cannot change at an hour boundary while two backends are being captured.
function generate_data(n, fixture = {}) {
  if (fixture.seed !== undefined) return generate_fixture_data({ ...fixture, bar_count: n });
  const out = [];
  let seed = fixture.seed ?? 42;
  // Integer-safe LCG: Math.imul gives the same wrapping-u32 sequence used by the native fixture.
  const rnd = () => (seed = (Math.imul(seed, 1664525) + 1013904223) >>> 0) / 0xffffffff;
  let price = fixture.start_price ?? 100;
  const hour = 3600;
  const end = fixture.end_time ?? Math.floor(Date.now() / 1000 / hour) * hour;
  const close_span = fixture.close_span ?? 2.4;
  const wick_span = fixture.wick_span ?? 1.2;
  const start = end - (n - 1) * hour;
  for (let i = 0; i < n; i++) {
    const o = price;
    const c = Math.max(1, o + (rnd() - 0.5) * close_span);
    out.push({ time: start + i * hour, open: o, high: Math.max(o, c) + rnd() * wick_span, low: Math.min(o, c) - rnd() * wick_span, close: c });
    price = c;
  }
  return out;
}

const query = new URLSearchParams(location.search);
const requested_backend = query.get("backend");
const runtime_test = query.get("runtimeTest");
const requested_spacing = Number.parseFloat(query.get("spacing") ?? "");
const requested_dpr = Number.parseFloat(query.get("dpr") ?? "");
const requested_theme = query.get("theme") ?? "light";
const requested_feature = query.get("feature");
const requested_left_scale = query.get("leftScale") === "1";
const parity_fixture = runtime_test === null
  ? null
  : await fetch("./fixtures/d1/candles.json", { cache: "no-store" }).then((response) => response.json());
// External browser runners cannot read a presented WebGPU canvas from page JavaScript. This mode
// removes all non-chart UI so an ordinary viewport screenshot is a stable full-frame artifact.
if (runtime_test === "presentedFrame") {
  document.getElementById("bar").style.display = "none";
  document.getElementById("legend").style.display = "none";
}
const chart_options = {
  autoSize: parity_fixture === null,
  // The backend-parity gate must begin on the ordinary automatic path; the second chart is forced
  // to Canvas2D by the separate runtime-test consumer.
  backend: runtime_test === "backendParity" ? "auto" : requested_backend === "canvas2d" ? "canvas2d" : "auto",
};
if (requested_left_scale) {
  chart_options.leftPriceScale = { visible: true };
  chart_options.rightPriceScale = { visible: false };
}
if (parity_fixture !== null) {
  const palette = fixture_theme(requested_theme);
  chart_options.layout = {
    background: { type: "solid", color: palette.background },
    textColor: palette.text,
  };
  chart_options.grid = {
    vertLines: { color: palette.grid },
    horzLines: { color: palette.grid },
  };
  // Keep the cross-library fidelity gate pinned to the reference's axis-border default; the package
  // theme palette (theme.ts) must not leak into the comparison.
  chart_options.timeScale = { borderColor: "#2B2B43" };
  chart_options.leftPriceScale = { ...(chart_options.leftPriceScale ?? {}), borderColor: "#2B2B43" };
  chart_options.rightPriceScale = { ...(chart_options.rightPriceScale ?? {}), borderColor: "#2B2B43" };
}
if (runtime_test === "adapterFailure") chart_options.__simulate_webgpu_adapter_failure = true;
if (query.get("forceFallbackAdapter") === "1") chart_options.__force_webgpu_fallback_adapter = true;
const chart = await create_chart(container, chart_options);
if (parity_fixture !== null) {
  chart.resize(
    parity_fixture.css_width,
    parity_fixture.css_height,
    Number.isFinite(requested_dpr) ? requested_dpr : parity_fixture.pixel_ratio,
  );
}
window.__chart = chart; // debug/test handle

const data = generate_data(parity_fixture?.bar_count ?? 1000, parity_fixture ?? {});
const main = chart.add_series("candlestick", requested_left_scale ? { priceScaleId: "left" } : undefined);
main.set_data(data);
chart.time_scale().fit_content();
if (Number.isFinite(requested_spacing)) {
  chart.time_scale().apply_options({ bar_spacing: requested_spacing, right_offset: 0 });
}
document.documentElement.dataset.barSpacing = String(chart.time_scale().options().bar_spacing);
document.documentElement.dataset.visibleLogicalRange = JSON.stringify(chart.time_scale().get_visible_logical_range());
const visible_price_axis = requested_left_scale ? chart.price_scale("left") : chart.price_scale("right");
document.documentElement.dataset.priceAxisWidth = String(visible_price_axis.width());
container.dataset.priceAxisWidth = String(visible_price_axis.width());
window.__main = main; // debug/test handle
window.__data = data;

// The indicator is produced by Rust and owned by the same engine as the candle series.
const sma_series = chart.add_sma(main, 20, { color: "#ff9800", line_width: 2, visible: false });

// volume: single-value histogram on the SAME pane, pinned to the bottom band via the overlay
// price scale (TradingView-style — no separate pane / divider), colored green/red by bar direction.
const volume_data = volume_fixture(data);
let vol_series = null;

// Fidelity fixtures use only the package's public handles. The demo supplies data and options;
// all scale, layout, and rendering behavior remains inside the headless engine.
if (requested_feature === "markers") {
  main.set_markers(marker_fixture(data));
} else if (requested_feature === "volume") {
  vol_series = chart.add_series("histogram", {
    overlay: true,
    scale_margins: { top: 0.82, bottom: 0 },
    histogram_updown: true,
    // matches the reference fixture (priceLineVisible/lastValueVisible: false)
    price_line_visible: false,
    last_value_visible: false,
  });
  vol_series.set_data(volume_data);
}

// ---- pane primitive demo (plugin platform Phase C-a) -----------------------------------------
// Alternating day-shading bands behind the series (reference zOrder "bottom"), attached to pane 0 via
// the public pane_api.attach_primitive. The renderer records Prim draw commands (no raw canvas),
// so the bands are identical on the WebGPU and Canvas2D backends. Off by default so the fidelity
// fixtures don't shift; `?feature=primitive` enables it for fixtures/tests.
function session_bands_primitive() {
  const day_seconds = 86400;
  return {
    pane_views() {
      return [{
        z_order: "bottom",
        renderer(ctx) {
          // Renderers run while the chart is mid-render, so they must not call chart APIs back
          // (the draw context is the read path). Draw every day band instead of querying the
          // visible range — the pane scissor clips the offscreen ones.
          if (data.length === 0) return;
          let start = 0;
          for (let i = 1; i <= data.length; i += 1) {
            const same_day = i < data.length
              && Math.floor(data[i].time / day_seconds) === Math.floor(data[start].time / day_seconds);
            if (same_day) continue;
            const day_index = Math.floor(data[start].time / day_seconds);
            if (day_index % 2 === 0) {
              const x0 = ctx.logical_to_x(start - 0.5);
              const x1 = ctx.logical_to_x(i - 1 + 0.5);
              if (x0 !== null && x1 !== null && x1 > x0
                && x1 > ctx.pane_left && x0 < ctx.pane_left + ctx.pane_width) {
                ctx.rect(x0, ctx.pane_top, x1 - x0, ctx.pane_height, "rgba(41, 98, 255, 0.08)");
              }
            }
            start = i;
          }
        },
      }];
    },
  };
}
let bands_handle = null;
function set_day_bands(on) {
  if (on && bands_handle === null) {
    bands_handle = chart.panes()[0].attach_primitive(session_bands_primitive());
  } else if (!on && bands_handle !== null) {
    bands_handle.detach();
    bands_handle = null;
  }
  document.getElementById("bands_toggle").checked = on;
}
document.getElementById("bands_toggle").addEventListener("change", (e) => set_day_bands(e.target.checked));
if (requested_feature === "primitive") set_day_bands(true);
window.__set_day_bands = set_day_bands; // test hook
window.__day_bands_active = () => bands_handle !== null; // test hook

// ---- series primitive demos (plugin platform Phase C-b) ----------------------------------
// Position band: a horizontal ±2% band around a fixed entry price on the main series
// (z_order "top") with a price-axis tag at the entry — the tag uses the `price` descriptor
// form, converted on the series' own scale by the host. Scale band: two dashed lines beyond
// the data whose `autoscale_info` expands the right scale while enabled. Both off by default
// so the fidelity fixtures don't shift; `?feature=series_primitive` enables the position band.
function position_band_primitive(entry_price) {
  const top = entry_price * 1.02;
  const bottom = entry_price * 0.98;
  // The band's last drawn geometry in absolute bitmap px, cached from the renderer so the
  // hit test (which runs on hover, outside any render) can test against it — the draw
  // context's coordinate space is the hit test's coordinate space.
  let band = null;
  return {
    pane_views() {
      return [{
        z_order: "top",
        renderer(ctx) {
          const y_top = ctx.price_to_y(top);
          const y_bottom = ctx.price_to_y(bottom);
          band = y_top === null || y_bottom === null
            ? null
            : { y_top, y_bottom, x0: ctx.pane_left, x1: ctx.pane_left + ctx.pane_width };
          if (band === null) return;
          ctx.rect(ctx.pane_left, y_top, ctx.pane_width, y_bottom - y_top, "rgba(255, 152, 0, 0.15)");
          ctx.hline(y_top, ctx.pane_left, ctx.pane_left + ctx.pane_width, "#ff9800", 2, 2);
          ctx.hline(y_bottom, ctx.pane_left, ctx.pane_left + ctx.pane_width, "#ff9800", 2, 2);
        },
      }];
    },
    // Hovering the band shows a move cursor and flows "position-band" into the mouse-event
    // params' hovered_object_id (plus hovered_series, since a series primitive's source IS
    // the series — reference parity).
    hit_test(x, y) {
      if (band !== null && x >= band.x0 && x <= band.x1 && y >= band.y_top && y <= band.y_bottom) {
        return { external_id: "position-band", cursor_style: "move", z_order: "top" };
      }
      return null;
    },
    price_axis_views() {
      return [{ text: `POS ${entry_price.toFixed(2)}`, price: entry_price, color: "#ff9800" }];
    },
  };
}
function scale_band_primitive(lo, hi) {
  return {
    pane_views() {
      return [{
        z_order: "top",
        renderer(ctx) {
          // Off-scale prices convert to null — the scissor would clip them anyway once the
          // autoscale contribution below brings them into view.
          const y_hi = ctx.price_to_y(hi);
          const y_lo = ctx.price_to_y(lo);
          if (y_hi !== null) ctx.hline(y_hi, ctx.pane_left, ctx.pane_left + ctx.pane_width, "#9c27b0", 2, 2);
          if (y_lo !== null) ctx.hline(y_lo, ctx.pane_left, ctx.pane_left + ctx.pane_width, "#9c27b0", 2, 2);
        },
      }];
    },
    autoscale_info() {
      return { min: lo, max: hi };
    },
  };
}
const position_entry = data.length > 0 ? data[Math.floor(data.length / 2)].close : 100;
const scale_band_bounds = data.length > 0
  ? {
      lo: Math.min(...data.map((bar) => bar.low)) - 10,
      hi: Math.max(...data.map((bar) => bar.high)) + 10,
    }
  : { lo: 90, hi: 110 };
let position_band_handle = null;
function set_position_band(on) {
  if (on && position_band_handle === null) {
    position_band_handle = main.attach_primitive(position_band_primitive(position_entry));
  } else if (!on && position_band_handle !== null) {
    position_band_handle.detach();
    position_band_handle = null;
  }
  document.getElementById("pos_band_toggle").checked = on;
}
let scale_band_handle = null;
function set_scale_band(on) {
  if (on && scale_band_handle === null) {
    scale_band_handle = main.attach_primitive(scale_band_primitive(scale_band_bounds.lo, scale_band_bounds.hi));
  } else if (!on && scale_band_handle !== null) {
    scale_band_handle.detach();
    scale_band_handle = null;
  }
  document.getElementById("scale_band_toggle").checked = on;
}
document.getElementById("pos_band_toggle").addEventListener("change", (e) => set_position_band(e.target.checked));
document.getElementById("scale_band_toggle").addEventListener("change", (e) => set_scale_band(e.target.checked));
if (requested_feature === "series_primitive") set_position_band(true);
window.__set_position_band = set_position_band; // test hook
window.__position_band_active = () => position_band_handle !== null; // test hook
window.__set_scale_band = set_scale_band; // test hook
window.__scale_band_active = () => scale_band_handle !== null; // test hook

// ---- custom series demo (plugin platform Phase C-c) -----------------------------------------
// The reference plugin-examples rounded-candles series, ported to the custom-series contract
// (fixture_custom_series.js): the engine owns the time mapping/autoscale, the plugin draws
// each bar through the command-recording render context — identical on both backends. Off by
// default so the fidelity fixtures don't shift; `?feature=custom_series` enables it.
let custom_series = null;
let custom_destroy_count = 0;
function set_custom_series(on) {
  if (on && custom_series === null) {
    custom_series = chart.add_custom_series(
      rounded_candles_pane_view({}, {
        on_render: (items) => {
          // Test observability: each frame's visible (x, time) pairs the plugin received.
          window.__custom_render_items = items.map(({ x, item }) => ({ x, time: item.time }));
        },
        on_destroy: () => { custom_destroy_count += 1; },
      }),
    );
    // The demo's candle data transformed into the plugin's item shape (OHLC + optional
    // `rounded`; the reference's RoundedCandleSeriesData).
    custom_series.set_data(data.map((bar) => ({
      time: bar.time, open: bar.open, high: bar.high, low: bar.low, close: bar.close,
    })));
    window.__custom = custom_series; // test handle
  } else if (!on && custom_series !== null) {
    chart.remove_series(custom_series);
    custom_series = null;
    window.__custom = null;
  }
  document.getElementById("custom_toggle").checked = on;
}
document.getElementById("custom_toggle").addEventListener("change", (e) => set_custom_series(e.target.checked));
if (requested_feature === "custom_series") set_custom_series(true);
window.__set_custom_series = set_custom_series; // test hook
window.__custom_series_active = () => custom_series !== null; // test hook
window.__custom_destroy_count = () => custom_destroy_count; // test hook

// ---- built-in plugins (plugin platform Phase 3.5: the reference's own plugin surface) ----------------
// Plugin markers: the same markers fixture the engine-markers path (`?feature=markers`) uses,
// drawn by `create_series_markers` on the primitive platform — a visual A/B against the
// engine's built-in markers. Plugin watermark: `create_text_watermark` on pane 0. Both off by
// default so the fidelity fixtures don't shift.
let plugin_markers_handle = null;
function set_plugin_markers(on, options, markers) {
  if (on && plugin_markers_handle === null) {
    plugin_markers_handle = create_series_markers(main, markers ?? marker_fixture(data), options);
  } else if (!on && plugin_markers_handle !== null) {
    plugin_markers_handle.detach();
    plugin_markers_handle = null;
  }
  document.getElementById("plugin_markers_toggle").checked = on;
}
document.getElementById("plugin_markers_toggle").addEventListener("change", (e) => set_plugin_markers(e.target.checked));
window.__set_plugin_markers = set_plugin_markers; // test hook
window.__plugin_markers_active = () => plugin_markers_handle !== null; // test hook
window.__plugin_markers_handle = () => plugin_markers_handle; // test hook
// Engine markers with the same fixture (the parity A/B counterpart); `?feature=markers` keeps
// its default-options form for the reference fidelity fixture.
window.__set_engine_markers = (on, options) => main.set_markers(on ? marker_fixture(data) : [], options); // test hook
let plugin_watermark_handle = null;
function set_plugin_watermark(on) {
  if (on && plugin_watermark_handle === null) {
    plugin_watermark_handle = create_text_watermark(chart.panes()[0], {
      lines: [
        { text: "AION", color: "rgba(41, 98, 255, 0.16)", fontSize: 72, fontStyle: "bold" },
        { text: "plugin watermark", color: "rgba(41, 98, 255, 0.30)", fontSize: 24, fontFamily: "monospace" },
      ],
    });
  } else if (!on && plugin_watermark_handle !== null) {
    plugin_watermark_handle.detach();
    plugin_watermark_handle = null;
  }
  document.getElementById("plugin_watermark_toggle").checked = on;
}
document.getElementById("plugin_watermark_toggle").addEventListener("change", (e) => set_plugin_watermark(e.target.checked));
window.__set_plugin_watermark = set_plugin_watermark; // test hook
window.__plugin_watermark_active = () => plugin_watermark_handle !== null; // test hook

// ---- canvas primitive demo (plugin platform Phase C-e) ----------------------------------------
// The reference plugin-examples vertical-line plugin, ported near-verbatim to the canvas-primitive
// escape hatch (fixture_canvas_plugin.js): the renderer draws with raw Canvas2D calls through the
// CanvasRenderingTarget2D mirror on the plugin overlay (above the pane, below the axis chrome).
// Off by default so the fidelity fixtures don't shift; `?feature=canvas_primitive` enables it.
let vert_line_handle = null;
function set_vert_line(on) {
  if (on && vert_line_handle === null) {
    vert_line_handle = chart.panes()[0].attach_canvas_primitive(
      vert_line_canvas_primitive(chart, main, data[Math.floor(data.length / 2)].time, { color: "#e91e63", width: 3 }),
    );
  } else if (!on && vert_line_handle !== null) {
    vert_line_handle.detach();
    vert_line_handle = null;
  }
  document.getElementById("vertline_toggle").checked = on;
}
document.getElementById("vertline_toggle").addEventListener("change", (e) => set_vert_line(e.target.checked));
if (requested_feature === "canvas_primitive") set_vert_line(true);
window.__set_vert_line = set_vert_line; // test hook
window.__vert_line_active = () => vert_line_handle !== null; // test hook
// Test hook: the package-owned plugin overlay canvas (gpu pane, fallback pane, plugin, overlay).
window.__plugin_canvas = () => container.querySelectorAll("canvas")[2]; // test hook

status.textContent = `1000 bars · ${chart.backend()} · dpr ${(window.devicePixelRatio || 1).toFixed(3)}`;

// Browser-matrix instrumentation, present only when explicitly requested. It drives the package's
// hidden WASM fault hook and then uses the normal public render/backend surface for verification;
// no chart model or rendering logic lives in this demo.
if (runtime_test === "deviceLoss" || runtime_test === "1") {
  const loss_button = document.createElement("button");
  loss_button.id = "simulate_device_loss";
  loss_button.textContent = "simulate WebGPU loss";
  loss_button.addEventListener("click", () => {
    chart.wasm.simulate_device_loss_for_test();
    // The package's backend-loss event schedules recovery first; this later microtask only reports
    // the result. The demo does not manually repaint or rebuild the chart.
    queueMicrotask(() => {
      status.textContent = `1000 bars · ${chart.backend()} · recovered`;
      loss_button.disabled = true;
    });
  });
  status.before(loss_button);
}
if (runtime_test === "screenshot") {
  const snapshot = chart.take_screenshot();
  snapshot.id = "chart_screenshot";
  snapshot.style.width = "100%";
  snapshot.style.height = "100%";
  snapshot.style.display = "block";
  chart.remove();
  container.appendChild(snapshot);
  status.textContent = `1000 bars · screenshot · ${snapshot.width}×${snapshot.height}`;
}

// ---- styling controls ----------------------------------------------------------------------
// Show only the style group(s) relevant to the current series kind.
function sync_style_visibility(kind) {
  document.getElementById("candle_style").hidden = !(kind === "candlestick" || kind === "bar");
  document.getElementById("line_style").hidden = !(kind === "line" || kind === "area" || kind === "baseline");
  document.getElementById("area_style").hidden = kind !== "area";
}

// Wick/border pickers pin an explicit color only once touched; until then the engine's
// reference parity fallback keeps each wick/border following its direction's body color, so the
// body pickers alone recolor the whole candle.
const candle_part_touched = { wick_up: false, wick_down: false, border_up: false, border_down: false };

// Re-apply the current control values to the main series (used after a type change).
function apply_main_style() {
  const options = {
    up_color: document.getElementById("up_color").value,
    down_color: document.getElementById("down_color").value,
    wick_visible: document.getElementById("wick_visible").checked,
    border_visible: document.getElementById("border_visible").checked,
    color: document.getElementById("line_color").value,
    line_width: Number(document.getElementById("line_width").value),
    area_top_color: document.getElementById("area_top").value,
    // fade the fill to fully-transparent at the base (standard area look)
    area_bottom_color: document.getElementById("area_top").value + "00",
  };
  if (candle_part_touched.wick_up) options.wick_up_color = document.getElementById("wick_up_color").value;
  if (candle_part_touched.wick_down) options.wick_down_color = document.getElementById("wick_down_color").value;
  if (candle_part_touched.border_up) options.border_up_color = document.getElementById("border_up_color").value;
  if (candle_part_touched.border_down) options.border_down_color = document.getElementById("border_down_color").value;
  main.apply_options(options);
}

// Grid controls drive both families (vert + horz) at once; the engine stores them separately,
// so a package consumer can style each family independently (reference lineStyle 0–4).
// Follow-or-pin: until the user pins a custom color, grid/axis colors track the theme tokens.
const theme_color_touched = { grid: false, axis_border: false, axis_text: false };
function apply_grid_style() {
  const color = document.getElementById("grid_color").value;
  const style = Number(document.getElementById("grid_style").value);
  const visible = document.getElementById("grid_toggle").checked;
  chart.apply_options({ grid: { vertLines: { color, style, visible }, horzLines: { color, style, visible } } });
}
document.getElementById("grid_toggle").addEventListener("change", apply_grid_style);
document.getElementById("grid_color").addEventListener("input", () => { theme_color_touched.grid = true; apply_grid_style(); });
document.getElementById("grid_style").addEventListener("change", apply_grid_style);

// Built-in last-price line + last-value label toggles (main series).
document.getElementById("price_line_toggle").addEventListener("change", (e) => main.apply_options({ price_line_visible: e.target.checked }));
document.getElementById("last_value_toggle").addEventListener("change", (e) => main.apply_options({ last_value_visible: e.target.checked }));

document.getElementById("up_color").addEventListener("input", () => main.apply_options({ up_color: document.getElementById("up_color").value }));
document.getElementById("down_color").addEventListener("input", () => main.apply_options({ down_color: document.getElementById("down_color").value }));
document.getElementById("wick_up_color").addEventListener("input", (e) => { candle_part_touched.wick_up = true; main.apply_options({ wick_up_color: e.target.value }); });
document.getElementById("wick_down_color").addEventListener("input", (e) => { candle_part_touched.wick_down = true; main.apply_options({ wick_down_color: e.target.value }); });
document.getElementById("border_up_color").addEventListener("input", (e) => { candle_part_touched.border_up = true; main.apply_options({ border_up_color: e.target.value }); });
document.getElementById("border_down_color").addEventListener("input", (e) => { candle_part_touched.border_down = true; main.apply_options({ border_down_color: e.target.value }); });
document.getElementById("wick_visible").addEventListener("change", (e) => main.apply_options({ wick_visible: e.target.checked }));
document.getElementById("border_visible").addEventListener("change", (e) => main.apply_options({ border_visible: e.target.checked }));
// Unpin every part override ("" = clear back to follow-body) and re-sync pickers to the body
// colors the parts now follow.
document.getElementById("candle_parts_reset").addEventListener("click", () => {
  candle_part_touched.wick_up = candle_part_touched.wick_down = candle_part_touched.border_up = candle_part_touched.border_down = false;
  main.apply_options({ wick_up_color: "", wick_down_color: "", border_up_color: "", border_down_color: "" });
  const up = document.getElementById("up_color").value;
  const down = document.getElementById("down_color").value;
  document.getElementById("wick_up_color").value = up;
  document.getElementById("border_up_color").value = up;
  document.getElementById("wick_down_color").value = down;
  document.getElementById("border_down_color").value = down;
});
document.getElementById("line_color").addEventListener("input", () => main.apply_options({ color: document.getElementById("line_color").value }));
document.getElementById("line_width").addEventListener("input", (e) => {
  document.getElementById("line_width_val").textContent = e.target.value;
  main.apply_options({ line_width: Number(e.target.value) });
});
document.getElementById("area_top").addEventListener("input", (e) => {
  main.apply_options({ area_top_color: e.target.value, area_bottom_color: e.target.value + "00" });
});

document.getElementById("sma_toggle").addEventListener("change", (e) => {
  sma_series.apply_options({ visible: e.target.checked });
});

document.getElementById("vol_toggle").addEventListener("change", (e) => {
  if (e.target.checked && vol_series === null) {
    // overlay on the price pane's bottom band; green/red by the main series' up/down direction.
    vol_series = chart.add_series("histogram", { overlay: true, scale_margins: { top: 0.82, bottom: 0 }, histogram_updown: true, price_line_visible: false, last_value_visible: false });
    vol_series.set_data(volume_data);
  } else if (!e.target.checked && vol_series !== null) {
    // Exercises the real remove_series API (tombstones the engine slot, not just clears data).
    chart.remove_series(vol_series);
    vol_series = null;
  }
});

document.querySelectorAll('input[name="series"]').forEach((el) => {
  el.addEventListener("change", () => {
    main.set_type(el.value);
    sync_style_visibility(el.value);
    apply_main_style();
  });
});
document.getElementById("cross_mode").addEventListener("change", (e) => {
  chart.apply_options({ crosshair: { mode: Number(e.target.value) } });
});

// Crosshair cosmetics drive both lines at once; the engine stores them per line (reference parity).
function apply_crosshair_style() {
  const color = document.getElementById("cross_color").value;
  const width = Number(document.getElementById("cross_width").value);
  const style = Number(document.getElementById("cross_style").value);
  const labelBackgroundColor = document.getElementById("cross_label_bg").value;
  const labelVisible = document.getElementById("cross_label_visible").checked;
  chart.apply_options({
    crosshair: {
      vertLine: { color, width, style, labelBackgroundColor, labelVisible },
      horzLine: { color, width, style, labelBackgroundColor, labelVisible },
    },
  });
}
document.getElementById("cross_color").addEventListener("input", apply_crosshair_style);
document.getElementById("cross_width").addEventListener("input", (e) => {
  document.getElementById("cross_width_val").textContent = e.target.value;
  apply_crosshair_style();
});
document.getElementById("cross_style").addEventListener("change", apply_crosshair_style);
document.getElementById("cross_label_bg").addEventListener("input", apply_crosshair_style);
document.getElementById("cross_label_visible").addEventListener("change", apply_crosshair_style);

function apply_font() {
  chart.apply_options({
    layout: {
      fontFamily: document.getElementById("font_family").value,
      fontSize: Number(document.getElementById("font_size").value),
    },
  });
  document.getElementById("font_size_val").textContent = document.getElementById("font_size").value;
}
document.getElementById("font_family").addEventListener("change", apply_font);
document.getElementById("font_size").addEventListener("input", apply_font);

document.getElementById("pane_separator_color").addEventListener("input", (e) => {
  chart.apply_options({ layout: { panes: { separatorColor: e.target.value } } });
});

// One demo control drives all three axis strips (left/right price + time); the engine stores
// them per strip, so a package consumer can also address each strip independently.
function apply_axis_border() {
  const borderColor = document.getElementById("axis_border_color").value;
  const borderVisible = document.getElementById("axis_border_visible").checked;
  chart.apply_options({
    leftPriceScale: { borderColor, borderVisible },
    rightPriceScale: { borderColor, borderVisible },
    timeScale: { borderColor, borderVisible },
  });
}
document.getElementById("axis_border_color").addEventListener("input", () => { theme_color_touched.axis_border = true; apply_axis_border(); });
document.getElementById("axis_border_visible").addEventListener("change", apply_axis_border);
document.getElementById("axis_text_color").addEventListener("input", (e) => {
  theme_color_touched.axis_text = true;
  chart.apply_options({ layout: { textColor: e.target.value } });
});

// ---- watermark (reference v4 shape) — drawn on the overlay above the series ----
function apply_watermark() {
  chart.apply_options({ watermark: {
    visible: document.getElementById("wm_visible").checked,
    text: document.getElementById("wm_text").value,
    // append ~50% alpha so the watermark reads as a faint overlay rather than covering the candles
    color: document.getElementById("wm_color").value + "80",
    fontSize: Number(document.getElementById("wm_size").value),
  } });
}
document.getElementById("wm_visible").addEventListener("change", apply_watermark);
document.getElementById("wm_text").addEventListener("input", apply_watermark);
document.getElementById("wm_color").addEventListener("input", apply_watermark);
document.getElementById("wm_size").addEventListener("input", (e) => {
  document.getElementById("wm_size_val").textContent = e.target.value;
  apply_watermark();
});

// ---- interaction toggles: axis drag-to-scale + mouse kinetic. reference/TradingView defaults:
// coasting is a touch behavior (kineticScroll.mouse = false), so mouse kinetic is OFF here by
// default; the checkbox exists to demo it. Touch kinetic stays on regardless (reference parity).
function apply_interaction() {
  const mouse_kinetic = document.getElementById("kinetic_toggle").checked;
  chart.apply_options({
    handle_scale: { axis_pressed_mouse_move: document.getElementById("axis_scale_toggle").checked },
    kinetic_scroll: { touch: true, mouse: mouse_kinetic },
  });
}
document.getElementById("axis_scale_toggle").addEventListener("change", apply_interaction);
document.getElementById("kinetic_toggle").addEventListener("change", apply_interaction);
apply_interaction();

// Theme presets come from the package's style settings file (theme.ts); applying one maps its
// tokens onto the chart options live (background + axis borders + axis text), then the pickers
// are synced so the controls reflect the active palette. The page chrome follows too.
function sync_page_theme(theme) {
  document.body.dataset.theme = theme;
  document.getElementById("theme_select").value = theme;
}
document.getElementById("theme_select").addEventListener("change", (e) => {
  const palette = theme_palette(e.target.value);
  // theme_options now includes the grid lines (grid follows the border token per theme).
  chart.apply_options(theme_options(e.target.value));
  // Follow-or-pin: untouched pickers adopt the new theme tokens; pinned colors are re-applied
  // after the theme patch so a user's explicit choice always wins.
  if (!theme_color_touched.axis_border) document.getElementById("axis_border_color").value = palette.border;
  apply_axis_border();
  if (!theme_color_touched.axis_text) document.getElementById("axis_text_color").value = palette.text;
  chart.apply_options({ layout: { textColor: palette.text } });
  if (!theme_color_touched.grid) document.getElementById("grid_color").value = palette.grid;
  apply_grid_style();
  sync_page_theme(e.target.value);
});
// Honor ?theme= on first load: apply the chart theme and sync the pickers (parity fixtures pin
// their own palette and must not be touched).
if (requested_theme !== "light" && parity_fixture === null) {
  const palette = theme_palette(requested_theme);
  chart.apply_options(theme_options(requested_theme));
  document.getElementById("axis_border_color").value = palette.border;
  apply_axis_border();
  document.getElementById("axis_text_color").value = palette.text;
  document.getElementById("grid_color").value = palette.grid;
  apply_grid_style();
}
sync_page_theme(requested_theme);
sync_style_visibility("candlestick");

// crosshair-move subscription → OHLC legend (the public event API); a hovered primitive
// object (e.g. the position band) shows its external id alongside.
const legend = document.getElementById("legend");
const fmt = (v) => (v === undefined ? "—" : v.toFixed(2));
chart.subscribe_crosshair_move((params) => {
  const bar = params.series_data.get(main);
  const tag = params.hovered_object_id !== null ? `  [${params.hovered_object_id}]` : "";
  if (!bar || params.point === null) { legend.textContent = "O — H — L — C —" + tag; return; }
  legend.textContent = `O ${fmt(bar.open)}  H ${fmt(bar.high)}  L ${fmt(bar.low)}  C ${fmt(bar.close)}` + tag;
});
chart.subscribe_click((params) => {
  if (params.time !== null) console.log("aion click @", new Date(params.time * 1000).toISOString());
});

if (runtime_test === "backendParity") {
  const { run_backend_parity } = await import("./runtime_tests.js");
  const result = await run_backend_parity({ create_chart, chart, container, data, fixture: parity_fixture, chart_options });
  window.__backend_parity_result = result;
  document.documentElement.dataset.backendParity = result.status;
  status.textContent = result.status === "passed"
    ? `screenshot API parity PASS · ${result.screenshot_api.different_pixels}/${result.screenshot_api.total_pixels} pixels differ · presented GPU readback ${result.presented_backend_capture}`
    : `backend parity ${result.status.toUpperCase()} · ${result.reason || `${result.different_pixels}/${result.total_pixels} pixels differ · max Δ ${result.maximum_channel_delta} · mean Δ ${result.mean_absolute_channel_delta.toFixed(3)} · GPU ${result.sample_webgpu.corner.join(",")} · 2D ${result.sample_canvas2d.corner.join(",")}`}`;
}
</script>
</body>
