<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- Without this, mobile browsers lay the page out at a 980px virtual width and then
     scale it down to the device, squishing the UI and adding a fractional CSS scale on top
     of the canvas bitmap. user-scalable=no stops native pinch-zoom fighting the chart. -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Aion Charts — @aion/charts demo</title>
<style>
  html, body { margin: 0; height: 100%; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif; }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  #bar { padding: 8px 12px; font-size: 13px; color: #191919; border-bottom: 1px solid #e0e3eb; display: flex; gap: 14px 18px; align-items: center; flex-wrap: wrap; }
  #bar .group { display: flex; gap: 8px; align-items: center; padding-right: 14px; border-right: 1px solid #e0e3eb; }
  #bar .group:last-child { border-right: none; }
  #bar label { display: inline-flex; gap: 4px; align-items: center; white-space: nowrap; }
  #bar input[type="color"] { width: 24px; height: 20px; padding: 0; border: 1px solid #d0d3da; border-radius: 3px; background: none; cursor: pointer; }
  #bar input[type="range"] { width: 72px; vertical-align: middle; }
  #bar .brand { background:#26a69a; color:#fff; padding:2px 6px; border-radius:3px; font-weight: bold; }
  /* The library creates and manages the canvases inside this container. */
  #chart_container { flex: 1; position: relative; touch-action: none; overscroll-behavior: none; }
  #status { color: #787b86; }
  /* crosshair-move legend (top-left, over the pane) driven by subscribe_crosshair_move */
  #legend { position: absolute; top: 8px; left: 8px; z-index: 3; font-size: 12px; color: #191919;
            background: rgba(255,255,255,0.7); padding: 3px 7px; border-radius: 3px; pointer-events: none;
            font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <span class="brand">@aion/charts</span>

    <div class="group" id="type_group">
      <label><input type="radio" name="series" value="candlestick" checked> candles</label>
      <label><input type="radio" name="series" value="bar"> bars</label>
      <label><input type="radio" name="series" value="line"> line</label>
      <label><input type="radio" name="series" value="area"> area</label>
      <label><input type="radio" name="series" value="baseline"> baseline</label>
    </div>

    <div class="group">
      <label><input type="checkbox" id="grid_toggle" checked> grid</label>
      <label>color <input type="color" id="grid_color" value="#d6dcde"></label>
      <label>style
        <select id="grid_style">
          <option value="0" selected>solid</option>
          <option value="1">dotted</option>
          <option value="2">dashed</option>
          <option value="3">large dashed</option>
          <option value="4">sparse dotted</option>
        </select>
      </label>
      <label>theme
        <select id="theme_select">
          <option value="light" selected>light</option>
          <option value="dark">dark</option>
        </select>
      </label>
    </div>

    <!-- candle/bar colors: body, wick, and border per direction + part visibility -->
    <div class="group" id="candle_style">
      <label>up <input type="color" id="up_color" value="#26a69a"></label>
      <label>down <input type="color" id="down_color" value="#ef5350"></label>
      <label>wick up <input type="color" id="wick_up_color" value="#26a69a"></label>
      <label>wick dn <input type="color" id="wick_down_color" value="#ef5350"></label>
      <label>border up <input type="color" id="border_up_color" value="#26a69a"></label>
      <label>border dn <input type="color" id="border_down_color" value="#ef5350"></label>
      <label><input type="checkbox" id="wick_visible" checked> wicks</label>
      <label><input type="checkbox" id="border_visible" checked> borders</label>
    </div>

    <!-- line/area stroke -->
    <div class="group" id="line_style" hidden>
      <label>color <input type="color" id="line_color" value="#2196f3"></label>
      <label>width <input type="range" id="line_width" min="1" max="8" step="1" value="3"><span id="line_width_val">3</span></label>
    </div>

    <!-- area fill -->
    <div class="group" id="area_style" hidden>
      <label>fill <input type="color" id="area_top" value="#2edc87"></label>
    </div>

    <div class="group">
      <label><input type="checkbox" id="sma_toggle"> SMA(20)</label>
      <label><input type="checkbox" id="vol_toggle"> volume</label>
    </div>

    <div class="group">
      <label>crosshair
        <select id="cross_mode">
          <option value="0" selected>normal</option>
          <option value="1">magnet</option>
          <option value="3">magnet OHLC</option>
          <option value="2">hidden</option>
        </select>
      </label>
    </div>

    <!-- price/time axis cosmetics: border (LWC borderColor/borderVisible) + text (textColor) -->
    <div class="group">
      <label>axis border <input type="color" id="axis_border_color" value="#f5f5f5"></label>
      <label><input type="checkbox" id="axis_border_visible" checked> visible</label>
      <label>axis text <input type="color" id="axis_text_color" value="#0a0a0a"></label>
    </div>

    <span id="status"></span>
  </div>
  <div id="chart_container"><div id="legend">O — H — L — C —</div></div>
</div>
<script type="module">
// Built from the real package distribution. The demo build copies @aion/charts' published
// artifacts; it does not compile or wire an engine of its own.
import { create_chart, theme_options, theme_palette } from "./dist/aion_charts.js";
import { generate_fixture_data } from "./fixture_data.js";
import { fixture_theme } from "./fixture_styles.js";
import { marker_fixture, volume_fixture } from "./fixture_features.js";

const container = document.getElementById("chart_container");
const status = document.getElementById("status");

// Deterministic random-walk OHLC data, as the array-of-objects the public API accepts — the
// library packs it into typed arrays at the boundary. Runtime fixtures pin the final timestamp so
// golden output cannot change at an hour boundary while two backends are being captured.
function generate_data(n, fixture = {}) {
  if (fixture.seed !== undefined) return generate_fixture_data({ ...fixture, bar_count: n });
  const out = [];
  let seed = fixture.seed ?? 42;
  // Integer-safe LCG: Math.imul gives the same wrapping-u32 sequence used by the native fixture.
  const rnd = () => (seed = (Math.imul(seed, 1664525) + 1013904223) >>> 0) / 0xffffffff;
  let price = fixture.start_price ?? 100;
  const hour = 3600;
  const end = fixture.end_time ?? Math.floor(Date.now() / 1000 / hour) * hour;
  const close_span = fixture.close_span ?? 2.4;
  const wick_span = fixture.wick_span ?? 1.2;
  const start = end - (n - 1) * hour;
  for (let i = 0; i < n; i++) {
    const o = price;
    const c = Math.max(1, o + (rnd() - 0.5) * close_span);
    out.push({ time: start + i * hour, open: o, high: Math.max(o, c) + rnd() * wick_span, low: Math.min(o, c) - rnd() * wick_span, close: c });
    price = c;
  }
  return out;
}

const query = new URLSearchParams(location.search);
const requested_backend = query.get("backend");
const runtime_test = query.get("runtimeTest");
const requested_spacing = Number.parseFloat(query.get("spacing") ?? "");
const requested_dpr = Number.parseFloat(query.get("dpr") ?? "");
const requested_theme = query.get("theme") ?? "light";
const requested_feature = query.get("feature");
const requested_left_scale = query.get("leftScale") === "1";
const parity_fixture = runtime_test === null
  ? null
  : await fetch("./fixtures/d1/candles.json", { cache: "no-store" }).then((response) => response.json());
// External browser runners cannot read a presented WebGPU canvas from page JavaScript. This mode
// removes all non-chart UI so an ordinary viewport screenshot is a stable full-frame artifact.
if (runtime_test === "presentedFrame") {
  document.getElementById("bar").style.display = "none";
  document.getElementById("legend").style.display = "none";
}
const chart_options = {
  autoSize: parity_fixture === null,
  // The backend-parity gate must begin on the ordinary automatic path; the second chart is forced
  // to Canvas2D by the separate runtime-test consumer.
  backend: runtime_test === "backendParity" ? "auto" : requested_backend === "canvas2d" ? "canvas2d" : "auto",
};
if (requested_left_scale) {
  chart_options.leftPriceScale = { visible: true };
  chart_options.rightPriceScale = { visible: false };
}
if (parity_fixture !== null) {
  const palette = fixture_theme(requested_theme);
  chart_options.layout = {
    background: { type: "solid", color: palette.background },
    textColor: palette.text,
  };
  chart_options.grid = {
    vertLines: { color: palette.grid },
    horzLines: { color: palette.grid },
  };
  // Keep the cross-library fidelity gate pinned to LWC's axis-border default; the package
  // theme palette (theme.ts) must not leak into the comparison.
  chart_options.timeScale = { borderColor: "#2B2B43" };
  chart_options.leftPriceScale = { ...(chart_options.leftPriceScale ?? {}), borderColor: "#2B2B43" };
  chart_options.rightPriceScale = { ...(chart_options.rightPriceScale ?? {}), borderColor: "#2B2B43" };
}
if (runtime_test === "adapterFailure") chart_options.__simulate_webgpu_adapter_failure = true;
if (query.get("forceFallbackAdapter") === "1") chart_options.__force_webgpu_fallback_adapter = true;
const chart = await create_chart(container, chart_options);
if (parity_fixture !== null) {
  chart.resize(
    parity_fixture.css_width,
    parity_fixture.css_height,
    Number.isFinite(requested_dpr) ? requested_dpr : parity_fixture.pixel_ratio,
  );
}
window.__chart = chart; // debug/test handle

const data = generate_data(parity_fixture?.bar_count ?? 1000, parity_fixture ?? {});
const main = chart.add_series("candlestick", requested_left_scale ? { priceScaleId: "left" } : undefined);
main.set_data(data);
chart.time_scale().fit_content();
if (Number.isFinite(requested_spacing)) {
  chart.time_scale().apply_options({ bar_spacing: requested_spacing, right_offset: 0 });
}
document.documentElement.dataset.barSpacing = String(chart.time_scale().options().bar_spacing);
document.documentElement.dataset.visibleLogicalRange = JSON.stringify(chart.time_scale().get_visible_logical_range());
const visible_price_axis = requested_left_scale ? chart.price_scale("left") : chart.price_scale("right");
document.documentElement.dataset.priceAxisWidth = String(visible_price_axis.width());
container.dataset.priceAxisWidth = String(visible_price_axis.width());
window.__main = main; // debug/test handle
window.__data = data;

// The indicator is produced by Rust and owned by the same engine as the candle series.
const sma_series = chart.add_sma(main, 20, { color: "#ff9800", line_width: 2, visible: false });

// volume: single-value histogram on the SAME pane, pinned to the bottom band via the overlay
// price scale (TradingView-style — no separate pane / divider), colored green/red by bar direction.
const volume_data = volume_fixture(data);
let vol_series = null;

// Fidelity fixtures use only the package's public handles. The demo supplies data and options;
// all scale, layout, and rendering behavior remains inside the headless engine.
if (requested_feature === "markers") {
  main.set_markers(marker_fixture(data));
} else if (requested_feature === "volume") {
  vol_series = chart.add_series("histogram", {
    overlay: true,
    scale_margins: { top: 0.82, bottom: 0 },
    histogram_updown: true,
  });
  vol_series.set_data(volume_data);
}

status.textContent = `1000 bars · ${chart.backend()} · dpr ${(window.devicePixelRatio || 1).toFixed(3)}`;

// Browser-matrix instrumentation, present only when explicitly requested. It drives the package's
// hidden WASM fault hook and then uses the normal public render/backend surface for verification;
// no chart model or rendering logic lives in this demo.
if (runtime_test === "deviceLoss" || runtime_test === "1") {
  const loss_button = document.createElement("button");
  loss_button.id = "simulate_device_loss";
  loss_button.textContent = "simulate WebGPU loss";
  loss_button.addEventListener("click", () => {
    chart.wasm.simulate_device_loss_for_test();
    // The package's backend-loss event schedules recovery first; this later microtask only reports
    // the result. The demo does not manually repaint or rebuild the chart.
    queueMicrotask(() => {
      status.textContent = `1000 bars · ${chart.backend()} · recovered`;
      loss_button.disabled = true;
    });
  });
  status.before(loss_button);
}
if (runtime_test === "screenshot") {
  const snapshot = chart.take_screenshot();
  snapshot.id = "chart_screenshot";
  snapshot.style.width = "100%";
  snapshot.style.height = "100%";
  snapshot.style.display = "block";
  chart.remove();
  container.appendChild(snapshot);
  status.textContent = `1000 bars · screenshot · ${snapshot.width}×${snapshot.height}`;
}

// ---- styling controls ----------------------------------------------------------------------
// Show only the style group(s) relevant to the current series kind.
function sync_style_visibility(kind) {
  document.getElementById("candle_style").hidden = !(kind === "candlestick" || kind === "bar");
  document.getElementById("line_style").hidden = !(kind === "line" || kind === "area" || kind === "baseline");
  document.getElementById("area_style").hidden = kind !== "area";
}

// Wick/border pickers pin an explicit color only once touched; until then the engine's
// LWC-parity fallback keeps each wick/border following its direction's body color, so the
// body pickers alone recolor the whole candle.
const candle_part_touched = { wick_up: false, wick_down: false, border_up: false, border_down: false };

// Re-apply the current control values to the main series (used after a type change).
function apply_main_style() {
  const options = {
    up_color: document.getElementById("up_color").value,
    down_color: document.getElementById("down_color").value,
    wick_visible: document.getElementById("wick_visible").checked,
    border_visible: document.getElementById("border_visible").checked,
    color: document.getElementById("line_color").value,
    line_width: Number(document.getElementById("line_width").value),
    area_top_color: document.getElementById("area_top").value,
    // fade the fill to fully-transparent at the base (standard area look)
    area_bottom_color: document.getElementById("area_top").value + "00",
  };
  if (candle_part_touched.wick_up) options.wick_up_color = document.getElementById("wick_up_color").value;
  if (candle_part_touched.wick_down) options.wick_down_color = document.getElementById("wick_down_color").value;
  if (candle_part_touched.border_up) options.border_up_color = document.getElementById("border_up_color").value;
  if (candle_part_touched.border_down) options.border_down_color = document.getElementById("border_down_color").value;
  main.apply_options(options);
}

// Grid controls drive both families (vert + horz) at once; the engine stores them separately,
// so a package consumer can style each family independently (LWC lineStyle 0–4).
function apply_grid_style() {
  const color = document.getElementById("grid_color").value;
  const style = Number(document.getElementById("grid_style").value);
  const visible = document.getElementById("grid_toggle").checked;
  chart.apply_options({ grid: { vertLines: { color, style, visible }, horzLines: { color, style, visible } } });
}
document.getElementById("grid_toggle").addEventListener("change", apply_grid_style);
document.getElementById("grid_color").addEventListener("input", apply_grid_style);
document.getElementById("grid_style").addEventListener("change", apply_grid_style);

document.getElementById("up_color").addEventListener("input", () => main.apply_options({ up_color: document.getElementById("up_color").value }));
document.getElementById("down_color").addEventListener("input", () => main.apply_options({ down_color: document.getElementById("down_color").value }));
document.getElementById("wick_up_color").addEventListener("input", (e) => { candle_part_touched.wick_up = true; main.apply_options({ wick_up_color: e.target.value }); });
document.getElementById("wick_down_color").addEventListener("input", (e) => { candle_part_touched.wick_down = true; main.apply_options({ wick_down_color: e.target.value }); });
document.getElementById("border_up_color").addEventListener("input", (e) => { candle_part_touched.border_up = true; main.apply_options({ border_up_color: e.target.value }); });
document.getElementById("border_down_color").addEventListener("input", (e) => { candle_part_touched.border_down = true; main.apply_options({ border_down_color: e.target.value }); });
document.getElementById("wick_visible").addEventListener("change", (e) => main.apply_options({ wick_visible: e.target.checked }));
document.getElementById("border_visible").addEventListener("change", (e) => main.apply_options({ border_visible: e.target.checked }));
document.getElementById("line_color").addEventListener("input", () => main.apply_options({ color: document.getElementById("line_color").value }));
document.getElementById("line_width").addEventListener("input", (e) => {
  document.getElementById("line_width_val").textContent = e.target.value;
  main.apply_options({ line_width: Number(e.target.value) });
});
document.getElementById("area_top").addEventListener("input", (e) => {
  main.apply_options({ area_top_color: e.target.value, area_bottom_color: e.target.value + "00" });
});

document.getElementById("sma_toggle").addEventListener("change", (e) => {
  sma_series.apply_options({ visible: e.target.checked });
});

document.getElementById("vol_toggle").addEventListener("change", (e) => {
  if (e.target.checked && vol_series === null) {
    // overlay on the price pane's bottom band; green/red by the main series' up/down direction.
    vol_series = chart.add_series("histogram", { overlay: true, scale_margins: { top: 0.82, bottom: 0 }, histogram_updown: true });
    vol_series.set_data(volume_data);
  } else if (!e.target.checked && vol_series !== null) {
    vol_series.set_data([]);
    vol_series = null;
  }
});

document.querySelectorAll('input[name="series"]').forEach((el) => {
  el.addEventListener("change", () => {
    main.set_type(el.value);
    sync_style_visibility(el.value);
    apply_main_style();
  });
});
document.getElementById("cross_mode").addEventListener("change", (e) => {
  chart.apply_options({ crosshair: { mode: Number(e.target.value) } });
});

// One demo control drives all three axis strips (left/right price + time); the engine stores
// them per strip, so a package consumer can also address each strip independently.
function apply_axis_border() {
  const borderColor = document.getElementById("axis_border_color").value;
  const borderVisible = document.getElementById("axis_border_visible").checked;
  chart.apply_options({
    leftPriceScale: { borderColor, borderVisible },
    rightPriceScale: { borderColor, borderVisible },
    timeScale: { borderColor, borderVisible },
  });
}
document.getElementById("axis_border_color").addEventListener("input", apply_axis_border);
document.getElementById("axis_border_visible").addEventListener("change", apply_axis_border);
document.getElementById("axis_text_color").addEventListener("input", (e) => {
  chart.apply_options({ layout: { textColor: e.target.value } });
});

// Theme presets come from the package's style settings file (theme.ts); applying one maps its
// tokens onto the chart options live (background + axis borders + axis text), then the pickers
// are synced so the controls reflect the active palette.
document.getElementById("theme_select").addEventListener("change", (e) => {
  chart.apply_options(theme_options(e.target.value));
  document.getElementById("axis_border_color").value = theme_palette(e.target.value).border;
  document.getElementById("axis_text_color").value = theme_palette(e.target.value).text;
  apply_axis_border();
});
sync_style_visibility("candlestick");

// crosshair-move subscription → OHLC legend (the public event API)
const legend = document.getElementById("legend");
const fmt = (v) => (v === undefined ? "—" : v.toFixed(2));
chart.subscribe_crosshair_move((params) => {
  const bar = params.series_data.get(main);
  if (!bar || params.point === null) { legend.textContent = "O — H — L — C —"; return; }
  legend.textContent = `O ${fmt(bar.open)}  H ${fmt(bar.high)}  L ${fmt(bar.low)}  C ${fmt(bar.close)}`;
});
chart.subscribe_click((params) => {
  if (params.time !== null) console.log("aion click @", new Date(params.time * 1000).toISOString());
});

if (runtime_test === "backendParity") {
  const { run_backend_parity } = await import("./runtime_tests.js");
  const result = await run_backend_parity({ create_chart, chart, container, data, fixture: parity_fixture, chart_options });
  window.__backend_parity_result = result;
  document.documentElement.dataset.backendParity = result.status;
  status.textContent = result.status === "passed"
    ? `screenshot API parity PASS · ${result.screenshot_api.different_pixels}/${result.screenshot_api.total_pixels} pixels differ · presented GPU readback ${result.presented_backend_capture}`
    : `backend parity ${result.status.toUpperCase()} · ${result.reason || `${result.different_pixels}/${result.total_pixels} pixels differ · max Δ ${result.maximum_channel_delta} · mean Δ ${result.mean_absolute_channel_delta.toFixed(3)} · GPU ${result.sample_webgpu.corner.join(",")} · 2D ${result.sample_canvas2d.corner.join(",")}`}`;
}
</script>
</body>
</html>
