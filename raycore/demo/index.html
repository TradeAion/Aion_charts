<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chart Core — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e11;
      color: #ccc;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 8px 16px;
      background: #16161a;
      border-bottom: 1px solid #2a2a30;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; color: #e0e0e0; font-weight: 600; }
    #renderer-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1a3a2a;
      color: #1abc9c;
      border: 1px solid #1abc9c44;
    }
    #renderer-badge.canvas2d {
      background: #1a2a3a;
      color: #4a9eff;
      border-color: #4a9eff44;
    }
    .controls {
      display: flex;
      gap: 6px;
      margin-left: auto;
      align-items: center;
    }
    .controls button {
      padding: 4px 11px;
      background: #2a2a30;
      color: #ccc;
      border: 1px solid #3a3a40;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }
    .controls button:hover { background: #3a3a42; }
    .controls button.active { background: #1a3a2a; color: #1abc9c; border-color: #1abc9c55; }
    .sep { width: 1px; height: 18px; background: #2a2a30; }
    /* The container — RayCore creates canvases inside it */
    #chart-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    #hud {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 11px;
      color: #555;
      pointer-events: none;
      line-height: 1.6;
      z-index: 10;
    }
    #error-banner {
      display: none;
      background: #2a1010;
      color: #ff6b6b;
      padding: 10px 16px;
      font-size: 13px;
      border-bottom: 1px solid #5a2020;
      flex-shrink: 0;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e11dd;
      font-size: 14px;
      color: #666;
      letter-spacing: 0.05em;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="error-banner"></div>
    <header>
      <h1>Chart Core</h1>
      <span id="renderer-badge">…</span>
    <div class="controls">
      <button id="btn-zoom-in">+ Zoom</button>
      <button id="btn-zoom-out">- Zoom</button>
      <button id="btn-pan-left">Pan Left</button>
      <button id="btn-pan-right">Pan Right</button>
      <button id="btn-reset">Reset</button>
    </div>
  </header>

  <div id="chart-container">
    <div id="loading">Initializing…</div>
    <div id="hud"></div>
  </div>

  <script type="module">
    import init, { RayCore } from '../pkg/raycore_wasm.js?v=2';

    const errorBanner = document.getElementById('error-banner');
    const loading     = document.getElementById('loading');
    const hud         = document.getElementById('hud');
    const badge       = document.getElementById('renderer-badge');
    const container   = document.getElementById('chart-container');

    function showError(msg) {
      errorBanner.textContent = 'Error: ' + msg;
      errorBanner.style.display = 'block';
      loading.style.display = 'none';
    }

    let core = null;
    let rafId = null;

    async function boot() {
      try {
        await init();

        loading.textContent = 'Initializing…';
        core = await RayCore.create('chart-container');

        const rName = core.renderer_name();
        badge.textContent = rName === 'webgpu' ? 'WebGPU' : 'Canvas 2D';
        badge.className = rName;

        // Load built-in demo data (600 bars generated in Rust)
        core.demo_mode();

        loading.style.display = 'none';
        hud.textContent = rName + ' | 600 bars | dpr=' + (window.devicePixelRatio||1).toFixed(1);

        // ── Render loop ────────────────────────────────────────────
        function frame() {
          rafId = requestAnimationFrame(frame);
          try { core.render(); } catch(e) {
            console.error('Render error:', e);
            cancelAnimationFrame(rafId); rafId = null;
          }
        }
        rafId = requestAnimationFrame(frame);

      } catch(e) {
        console.error(e);
        showError('Init failed: ' + (e.message || e));
      }
    }

    // ── Resize ──────────────────────────────────────────────────────
    new ResizeObserver(() => core?.resize()).observe(container);

    // ── Pointer events → WASM ───────────────────────────────────────
    container.addEventListener('pointermove', e => {
      if (!core) return;
      const r = container.getBoundingClientRect();
      core.pointer_move(e.clientX - r.left, e.clientY - r.top);
      if (core.is_dragging()) container.style.cursor = 'grabbing';
    });

    container.addEventListener('pointerdown', e => {
      if (!core) return;
      const r = container.getBoundingClientRect();
      core.pointer_down(e.clientX - r.left, e.clientY - r.top);
      container.setPointerCapture(e.pointerId);
    });

    container.addEventListener('pointerup', e => {
      if (!core) return;
      core.pointer_up();
      container.releasePointerCapture(e.pointerId);
      container.style.cursor = '';
    });

    container.addEventListener('pointerleave', () => {
      core?.pointer_leave();
      container.style.cursor = '';
    });

    container.addEventListener('wheel', e => {
      e.preventDefault();
      if (!core) return;
      const r = container.getBoundingClientRect();
      core.wheel(e.clientX - r.left, e.clientY - r.top, e.deltaY);
    }, { passive: false });

    // ── Toolbar buttons ─────────────────────────────────────────────
    const midBar = () => { const r = core.visible_range(); return (r[0]+r[1])/2; };
    document.getElementById('btn-zoom-in'   ).onclick = () => core?.zoom(midBar(), 0.8);
    document.getElementById('btn-zoom-out'  ).onclick = () => core?.zoom(midBar(), 1.25);
    document.getElementById('btn-pan-left'  ).onclick = () => core?.pan(-15);
    document.getElementById('btn-pan-right' ).onclick = () => core?.pan(15);
    document.getElementById('btn-reset'     ).onclick = () => core?.zoom_to_range(BigInt(0), BigInt(600));

    // ── Boot ─────────────────────────────────────────────────────────
    boot();
  </script>
</body>
</html>
