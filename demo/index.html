<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Chart Core — Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      touch-action: none;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: none;
    }

    body {
      background: #171717;
      color: #ccc;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      padding: 8px 16px;
      background: #16161a;
      border-bottom: 1px solid #2a2a30;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      color: #e0e0e0;
      font-weight: 600;
    }

    #renderer-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1a3a2a;
      color: #1abc9c;
      border: 1px solid #1abc9c44;
    }

    #renderer-badge.canvas2d {
      background: #1a2a3a;
      color: #4a9eff;
      border-color: #4a9eff44;
    }

    .toggle-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      background: #222228;
      color: #aaa;
      border: 1px solid #3a3a44;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-btn:hover {
      background: #2a2a34;
      color: #ddd;
    }

    .toggle-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .toggle-btn.active {
      background: #1a3a2a;
      color: #1abc9c;
      border-color: #1abc9c44;
    }

    .toggle-group {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    /* The container — RayCore creates canvases inside it */
    #chart-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
      min-height: 200px;
      touch-action: none;
    }

    #hud {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 11px;
      color: #555;
      pointer-events: none;
      line-height: 1.6;
      z-index: 10;
    }

    #error-banner {
      display: none;
      background: #2a1010;
      color: #ff6b6b;
      padding: 10px 16px;
      font-size: 13px;
      border-bottom: 1px solid #5a2020;
      flex-shrink: 0;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #171717dd;
      font-size: 14px;
      color: #666;
      letter-spacing: 0.05em;
      z-index: 20;
    }

    /* ── Mobile responsiveness ── */
    @media (max-width: 600px) {
      header {
        padding: 6px 10px;
        gap: 8px;
      }

      header h1 {
        font-size: 13px;
      }

      #renderer-badge {
        font-size: 10px;
        padding: 1px 6px;
      }

      .toggle-btn {
        font-size: 10px;
        padding: 2px 8px;
      }

      #hud {
        font-size: 10px;
        top: 4px;
        left: 4px;
      }
    }

    @media (max-height: 400px) {
      header {
        padding: 4px 10px;
      }

      header h1 {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="error-banner"></div>
  <header>
    <h1>Chart Core</h1>
    <span id="renderer-badge">…</span>
    <button class="toggle-btn" id="crosshair-btn" title="Cycle crosshair: Normal → Magnet → OHLC">Normal</button>
    <span style="color:#444;margin:0 4px">|</span>
    <button class="toggle-btn" id="draw-trendline" title="Trend Line">Line</button>
    <button class="toggle-btn" id="draw-rectangle" title="Rectangle">Rect</button>
    <button class="toggle-btn" id="draw-fibonacci" title="Fibonacci Retracement">Fib</button>
    <button class="toggle-btn" id="draw-scale" title="Price Range / Scale">Scale</button>
    <button class="toggle-btn" id="draw-clear" title="Clear all drawings">Clear</button>
    <span style="color:#444;margin:0 4px">|</span>
    <button class="toggle-btn" id="sma-toggle" title="Toggle SMA-20 study">SMA-20</button>
    <button class="toggle-btn" id="ema-toggle" title="Toggle EMA-20 study">EMA-20</button>
    <button class="toggle-btn" id="rsi-toggle" title="Toggle RSI-14 study">RSI-14</button>
    <button class="toggle-btn" id="macd-toggle" title="Toggle MACD study">MACD</button>
    <span style="color:#444;margin:0 4px">|</span>
    <button class="toggle-btn" id="stream-toggle" title="Start/stop real-time bar simulation">▶ Live</button>
    <div class="toggle-group" id="toggle-group"></div>
  </header>

  <div id="chart-container">
    <div id="loading">Initializing…</div>
    <div id="hud"></div>
  </div>

  <script type="module">
    import init, { RayCore } from '../pkg/raycore_wasm.js?v=20250615a';

    const errorBanner = document.getElementById('error-banner');
    const loading = document.getElementById('loading');
    const hud = document.getElementById('hud');
    const badge = document.getElementById('renderer-badge');
    const toggleGroup = document.getElementById('toggle-group');
    const container = document.getElementById('chart-container');
    const crosshairBtn = document.getElementById('crosshair-btn');
    const crosshairModes = ['normal', 'magnet', 'magnet_ohlc'];
    const crosshairLabels = { normal: 'Normal', magnet: 'Magnet', magnet_ohlc: 'OHLC' };

    // Drawing tool buttons
    const drawBtns = {
      'draw-trendline': 'trend_line',
      'draw-rectangle': 'rectangle',
      'draw-fibonacci': 'fibonacci',
      'draw-scale': 'scale',
    };
    let activeDrawTool = 'none';
    for (const [btnId, tool] of Object.entries(drawBtns)) {
      document.getElementById(btnId).addEventListener('click', () => {
        const newTool = activeDrawTool === tool ? 'none' : tool;
        activeDrawTool = newTool;
        for (const [bid, _] of Object.entries(drawBtns)) {
          document.getElementById(bid).classList.toggle('active', drawBtns[bid] === newTool);
        }
        if (core) core.set_drawing_tool(newTool);
      });
    }
    document.getElementById('draw-clear').addEventListener('click', () => {
      if (core) core.clear_drawings();
    });
    // Keyboard: Delete removes selected, Escape cancels creation
    document.addEventListener('keydown', (e) => {
      if (!core) return;
      if (e.key === 'Delete' || e.key === 'Backspace') core.remove_selected_drawing();
      if (e.key === 'Escape') {
        core.cancel_drawing();
        core.set_drawing_tool('none');
        activeDrawTool = 'none';
        for (const [bid, _] of Object.entries(drawBtns)) {
          document.getElementById(bid).classList.remove('active');
        }
      }
    });

    // Right-click: sync toolbar state (scale tool exits on right-click via WASM)
    document.addEventListener('contextmenu', () => {
      if (activeDrawTool === 'scale') {
        activeDrawTool = 'none';
        for (const [bid, _] of Object.entries(drawBtns)) {
          document.getElementById(bid).classList.remove('active');
        }
      }
    });

    // Crosshair mode cycle
    crosshairBtn.addEventListener('click', () => {
      const idx = (crosshairModes.indexOf(crosshairMode) + 1) % crosshairModes.length;
      crosshairMode = crosshairModes[idx];
      crosshairBtn.textContent = crosshairLabels[crosshairMode];
      crosshairBtn.classList.toggle('active', crosshairMode !== 'normal');
      if (core) {
        core.set_crosshair_mode(crosshairMode);
      }
    });

    function showError(msg) {
      errorBanner.textContent = 'Error: ' + msg;
      errorBanner.style.display = 'block';
      loading.style.display = 'none';
    }

    let core = null;
    let rafId = 0;
    let currentRenderer = null;
    let crosshairMode = 'normal';

    function updateBadge(rName) {
      badge.textContent = rName === 'webgpu' ? 'WebGPU' : 'Canvas 2D';
      badge.className = rName === 'webgpu' ? 'webgpu' : 'canvas2d';
    }

    function updateToggleButtons(active) {
      toggleGroup.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.renderer === active);
      });
    }

    async function createChart(renderer) {
      // Tear down previous instance
      if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
      if (core) { core.dispose(); core.free(); core = null; }

      // Clear container DOM (RayCore appends its own elements)
      // Keep #loading and #hud
      const keep = new Set(['loading', 'hud']);
      Array.from(container.children).forEach(el => {
        if (!keep.has(el.id)) el.remove();
      });

      loading.textContent = 'Switching to ' + renderer + '…';
      loading.style.display = 'flex';
      errorBanner.style.display = 'none';

      try {
        core = await RayCore.create_with('chart-container', renderer);
        currentRenderer = core.renderer_name();
        updateBadge(currentRenderer);
        updateToggleButtons(currentRenderer);

        core.demo_mode();
        loading.style.display = 'none';

        // Restore crosshair mode
        if (crosshairMode !== 'normal') {
          core.set_crosshair_mode(crosshairMode);
        }

        hud.textContent = currentRenderer + ' | 600 bars | dpr=' + (window.devicePixelRatio || 1).toFixed(1);

        // ── Studies & Overlays ──────────────────────────────────────────────
        const numBars = 600;
        const nowMs = Date.now();
        const intervalMs = 60000;
        const startMs = nowMs - numBars * intervalMs;

        // ── Study management ────────────────────────────────────────────────
        // Track study IDs and their line series overlays
        const studies = {
          sma: { id: null, seriesId: null, visible: false, btn: document.getElementById('sma-toggle') },
          ema: { id: null, seriesId: null, visible: false, btn: document.getElementById('ema-toggle') },
          rsi: { id: null, seriesId: null, visible: false, btn: document.getElementById('rsi-toggle') },
          macd: { id: null, seriesIds: [], visible: false, btn: document.getElementById('macd-toggle') },
        };

        // Study line colors
        const studyColors = {
          sma:  { r: 0.161, g: 0.384, b: 1.0,   a: 1.0 },  // #2962FF blue
          ema:  { r: 1.0,   g: 0.627, b: 0.0,   a: 1.0 },  // #FFA000 amber
          rsi:  { r: 0.608, g: 0.349, b: 0.714, a: 1.0 },  // #9B59B6 purple
          macd_line:   { r: 0.161, g: 0.384, b: 1.0,   a: 1.0 },  // blue
          macd_signal: { r: 1.0,   g: 0.627, b: 0.0,   a: 1.0 },  // amber
          macd_hist:   { r: 0.18,  g: 0.8,   b: 0.44,  a: 0.6 },  // green
        };

        function createStudyAndOverlay(type) {
          const study = studies[type];
          if (study.id !== null) return; // already created

          // Create the study via WASM API
          study.id = core.create_study(type);
          if (study.id === 0) {
            console.warn(`Failed to create study: ${type}`);
            study.id = null;
            return;
          }

          // Get study output and create line series overlay(s)
          if (type === 'macd') {
            // MACD has 3 outputs: MACD line, Signal line, Histogram
            for (let outIdx = 0; outIdx < 3; outIdx++) {
              const output = core.get_study_output(study.id, outIdx);
              if (!output) continue;

              let seriesId;
              if (outIdx === 0) {
                // MACD line
                const c = studyColors.macd_line;
                seriesId = core.add_line_series(c.r, c.g, c.b, c.a, 2.0);
              } else if (outIdx === 1) {
                // Signal line
                const c = studyColors.macd_signal;
                seriesId = core.add_line_series(c.r, c.g, c.b, c.a, 1.5);
              } else {
                // Histogram — use histogram series
                const c = studyColors.macd_hist;
                seriesId = core.add_histogram_series(c.r, c.g, c.b, c.a, 0.0);
              }

              // Set data from study output
              if (outIdx < 2) {
                core.set_series_data(seriesId, output.values, output.timestamps);
              } else {
                // Histogram data
                core.set_histogram_data(seriesId, output.values, output.timestamps,
                  new Float32Array(0), new Float32Array(0), new Float32Array(0), new Float32Array(0));
              }
              study.seriesIds.push(seriesId);
            }
          } else {
            // Single-output studies (SMA, EMA, RSI)
            const output = core.get_study_output(study.id, 0);
            if (!output) {
              console.warn(`No output for study ${type}`);
              return;
            }

            const c = studyColors[type];
            study.seriesId = core.add_line_series(c.r, c.g, c.b, c.a, 2.0);
            core.set_series_data(study.seriesId, output.values, output.timestamps);
          }

          study.visible = true;
          study.btn.classList.add('active');
        }

        function toggleStudy(type) {
          const study = studies[type];
          if (study.id === null) {
            createStudyAndOverlay(type);
          } else {
            study.visible = !study.visible;
            if (type === 'macd') {
              for (const sid of study.seriesIds) {
                core.set_series_visible(sid, study.visible);
              }
            } else {
              core.set_series_visible(study.seriesId, study.visible);
            }
            study.btn.classList.toggle('active', study.visible);
          }
        }

        // Wire up study buttons
        studies.sma.btn.addEventListener('click', () => toggleStudy('sma'));
        studies.ema.btn.addEventListener('click', () => toggleStudy('ema'));
        studies.rsi.btn.addEventListener('click', () => toggleStudy('rsi'));
        studies.macd.btn.addEventListener('click', () => toggleStudy('macd'));

        // ── Real-time streaming simulation ──────────────────────────────────
        let streamInterval = null;
        let lastBarTs = BigInt(startMs + (numBars - 1) * intervalMs);
        let lastClose = 42000.0; // approximate starting price
        const streamBtn = document.getElementById('stream-toggle');

        function simulateTick() {
          // Random walk for price
          const change = (Math.random() - 0.48) * lastClose * 0.003;
          const newClose = lastClose + change;
          const newHigh = Math.max(newClose, lastClose) + Math.abs(change) * 0.5;
          const newLow = Math.min(newClose, lastClose) - Math.abs(change) * 0.5;
          const volume = 100 + Math.random() * 500;

          // Every 3 seconds, start a new bar; otherwise update the last bar
          const now = BigInt(Date.now());
          const elapsed = Number(now - lastBarTs);

          if (elapsed >= 3000) {
            // New bar
            lastBarTs = now;
            core.append_bar(now, newClose, newHigh, newLow, newClose, volume);
          } else {
            // Update current bar
            core.update_last_bar(lastBarTs, lastClose, newHigh, newLow, newClose, volume);
          }

          lastClose = newClose;
        }

        streamBtn.addEventListener('click', () => {
          if (streamInterval) {
            clearInterval(streamInterval);
            streamInterval = null;
            streamBtn.textContent = '▶ Live';
            streamBtn.classList.remove('active');
          } else {
            streamInterval = setInterval(simulateTick, 200);
            streamBtn.textContent = '⏸ Live';
            streamBtn.classList.add('active');
          }
        });

        function frame() {
          rafId = requestAnimationFrame(frame);
          try { core.render(); } catch (e) {
            console.error('Render error:', e);
          }
        }
        rafId = requestAnimationFrame(frame);
      } catch (e) {
        console.error(e);
        showError('Init failed (' + renderer + '): ' + (e.message || e));
      }
    }

    async function boot() {
      try {
        await init();

        // Build toggle buttons from supported renderers
        const renderers = RayCore.get_supported_renderers();
        const labels = { canvas2d: 'Canvas 2D', webgpu: 'WebGPU' };
        for (const r of renderers) {
          const btn = document.createElement('button');
          btn.className = 'toggle-btn';
          btn.dataset.renderer = r;
          btn.textContent = labels[r] || r;
          btn.addEventListener('click', () => {
            if (currentRenderer === r) return;
            createChart(r);
          });
          toggleGroup.appendChild(btn);
        }

        // Start with the best available renderer
        const preferred = renderers.includes('webgpu') ? 'webgpu' : 'canvas2d';
        await createChart(preferred);

      } catch (e) {
        console.error(e);
        showError('Init failed: ' + (e.message || e));
      }
    }

    boot();
  </script>
</body>

</html>
