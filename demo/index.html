<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>RayCore Demo</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       Base Styles
       ═══════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { touch-action: none; overscroll-behavior: none; }
    
    body {
      background: #131316;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }
    body.light { background: #f5f5f5; color: #1a1a1a; }

    /* ═══════════════════════════════════════════════════════════════════════
       Toolbar
       ═══════════════════════════════════════════════════════════════════════ */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #1a1a1e;
      border-bottom: 1px solid #2a2a30;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    body.light .toolbar { background: #fff; border-color: #ddd; }

    .toolbar-section {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .toolbar-divider {
      width: 1px;
      height: 20px;
      background: #333;
      margin: 0 6px;
    }
    body.light .toolbar-divider { background: #ccc; }

    .toolbar-title {
      font-size: 14px;
      font-weight: 600;
      color: #22C55E;
      margin-right: 8px;
    }

    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1a3328;
      color: #22C55E;
      border: 1px solid #22C55E33;
    }
    .badge.canvas2d { background: #1a2a3a; color: #3B82F6; border-color: #3B82F633; }

    /* ═══════════════════════════════════════════════════════════════════════
       Buttons
       ═══════════════════════════════════════════════════════════════════════ */
    .btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      background: #252530;
      color: #999;
      border: 1px solid #3a3a44;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #2f2f3a; color: #ddd; }
    .btn.active { background: #1a3328; color: #22C55E; border-color: #22C55E44; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    body.light .btn { background: #eee; color: #555; border-color: #ccc; }
    body.light .btn:hover { background: #ddd; color: #222; }
    body.light .btn.active { background: #dcfce7; color: #16a34a; border-color: #22C55E44; }

    /* ═══════════════════════════════════════════════════════════════════════
       Chart Container
       ═══════════════════════════════════════════════════════════════════════ */
    #chart-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #131316ee;
      font-size: 13px;
      color: #666;
      z-index: 20;
    }
    body.light #loading { background: #f5f5f5ee; }

    #error-banner {
      display: none;
      background: #2a1515;
      color: #f87171;
      padding: 8px 16px;
      font-size: 12px;
      border-bottom: 1px solid #5a2020;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       HUD Overlay
       ═══════════════════════════════════════════════════════════════════════ */
    #hud {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 11px;
      color: #666;
      pointer-events: none;
      z-index: 10;
    }
    #hud-price { font-size: 14px; font-weight: 600; color: #22C55E; }
    #hud-status { margin-top: 2px; font-size: 10px; }
    #hud-shortcuts {
      margin-top: 8px;
      padding: 6px 8px;
      background: #1a1a1ecc;
      border-radius: 4px;
      font-size: 10px;
      color: #888;
      line-height: 1.6;
    }
    body.light #hud-shortcuts { background: #ffffffcc; color: #666; }
    .shortcut-key {
      display: inline-block;
      padding: 1px 4px;
      background: #333;
      border-radius: 3px;
      font-family: monospace;
      font-size: 9px;
      color: #aaa;
    }
    body.light .shortcut-key { background: #e0e0e0; color: #333; }

    /* ═══════════════════════════════════════════════════════════════════════
       Responsive
       ═══════════════════════════════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .toolbar { padding: 4px 8px; gap: 4px; }
      .btn { font-size: 10px; padding: 3px 8px; }
      .toolbar-title { font-size: 12px; }
      .hide-mobile { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="error-banner"></div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Toolbar
       ═══════════════════════════════════════════════════════════════════════ -->
  <div class="toolbar">
    <!-- Brand -->
    <span class="toolbar-title">RayCore</span>
    <span id="renderer-badge" class="badge">…</span>
    
    <div class="toolbar-divider"></div>

    <!-- Theme -->
    <div class="toolbar-section">
      <button class="btn" id="theme-toggle" title="Toggle theme">☀ Light</button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Chart Type -->
    <div class="toolbar-section">
      <button class="btn active" id="chart-candlestick">Candle</button>
      <button class="btn" id="chart-ohlc">OHLC</button>
      <button class="btn" id="chart-line">Line</button>
      <button class="btn" id="chart-area">Area</button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Drawing Tools -->
    <div class="toolbar-section">
      <button class="btn" id="draw-trendline" title="Trend Line (Shift: snap angle, Ctrl: snap OHLC)">Line</button>
      <button class="btn" id="draw-hline" title="Horizontal Line">H-Line</button>
      <button class="btn" id="draw-vline" title="Vertical Line">V-Line</button>
      <button class="btn" id="draw-ray" title="Ray">Ray</button>
      <button class="btn" id="draw-rectangle" title="Rectangle">Rect</button>
      <button class="btn" id="draw-fibonacci" title="Fibonacci Retracement">Fib</button>
      <button class="btn" id="draw-brush" title="Freehand Brush">Brush</button>
      <button class="btn" id="draw-clear" title="Clear all drawings">Clear</button>
    </div>

    <div class="toolbar-divider hide-mobile"></div>

    <!-- Studies (overlay) -->
    <div class="toolbar-section hide-mobile">
      <button class="btn" id="sma-toggle" title="SMA-20">SMA</button>
      <button class="btn" id="ema-toggle" title="EMA-20">EMA</button>
      <button class="btn" id="bollinger-toggle" title="Bollinger Bands">BB</button>
      <button class="btn" id="vwap-toggle" title="VWAP">VWAP</button>
    </div>

    <div class="toolbar-divider hide-mobile"></div>

    <!-- Indicator Panes -->
    <div class="toolbar-section hide-mobile">
      <button class="btn" id="rsi-pane-btn" title="RSI sub-pane">RSI</button>
      <button class="btn" id="macd-pane-btn" title="MACD sub-pane">MACD</button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Controls -->
    <div class="toolbar-section">
      <button class="btn" id="stream-toggle" title="Live data simulation">▶ Live</button>
      <button class="btn active" id="autoscroll-toggle" title="Auto-scroll with new data">Auto</button>
    </div>

    <!-- Renderer (right side) -->
    <div class="toolbar-section" style="margin-left: auto;" id="renderer-group"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Chart
       ═══════════════════════════════════════════════════════════════════════ -->
  <div id="chart-container">
    <div id="loading">Initializing…</div>
    <div id="hud">
      <div id="hud-price"></div>
      <div id="hud-status"></div>
      <div id="hud-shortcuts">
        <b>Shortcuts:</b><br>
        <span class="shortcut-key">Shift</span> Angle snap (45°)<br>
        <span class="shortcut-key">Ctrl</span> OHLC snap<br>
        <span class="shortcut-key">Esc</span> Cancel / Deselect<br>
        <span class="shortcut-key">Del</span> Delete selected<br>
        <span class="shortcut-key">←→</span> Scroll<br>
        <span class="shortcut-key">+−</span> Zoom
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Script
       ═══════════════════════════════════════════════════════════════════════ -->
  <script type="module">
    import init, { RayCore, ChartGroup, ChartWorkspace } from './pkg/raycore_wasm.js?v=20260227-drawing-snap';

    // ═══════════════════════════════════════════════════════════════════════
    // DOM Elements
    // ═══════════════════════════════════════════════════════════════════════
    const $ = id => document.getElementById(id);
    const container = $('chart-container');
    const loading = $('loading');
    const errorBanner = $('error-banner');
    const badge = $('renderer-badge');
    const hudPrice = $('hud-price');
    const hudStatus = $('hud-status');
    const rendererGroup = $('renderer-group');

    // ═══════════════════════════════════════════════════════════════════════
    // State
    // ═══════════════════════════════════════════════════════════════════════
    let core = null;
    let workspace = null;
    let currentRenderer = null;
    let isDark = true;
    let activeChartType = 'candlestick';
    let activeDrawTool = 'none';
    let streamInterval = null;

    // ═══════════════════════════════════════════════════════════════════════
    // Utilities
    // ═══════════════════════════════════════════════════════════════════════
    function showError(msg) {
      errorBanner.textContent = 'Error: ' + msg;
      errorBanner.style.display = 'block';
      loading.style.display = 'none';
    }

    function updateBadge(name) {
      badge.textContent = name === 'webgpu' ? 'WebGPU' : 'Canvas2D';
      badge.className = 'badge' + (name === 'canvas2d' ? ' canvas2d' : '');
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Demo Data
    // ═══════════════════════════════════════════════════════════════════════
    function createDemoData(numBars = 500) {
      const intervalMs = 60_000;
      const nowMs = Date.now();
      const startMs = nowMs - numBars * intervalMs;
      
      const open = new Float32Array(numBars);
      const high = new Float32Array(numBars);
      const low = new Float32Array(numBars);
      const close = new Float32Array(numBars);
      const volume = new Float32Array(numBars);
      const timestamps = new BigUint64Array(numBars);
      
      let seed = 0xC0FFEE;
      const rand = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
      
      let price = 42000.0;
      for (let i = 0; i < numBars; i++) {
        const drift = (rand() - 0.48) * price * 0.004;
        const next = price + drift;
        const wick = Math.abs(drift) * (0.3 + rand() * 0.7);
        open[i] = price;
        close[i] = next;
        high[i] = Math.max(price, next) + wick;
        low[i] = Math.min(price, next) - wick;
        volume[i] = 100 + rand() * 900;
        timestamps[i] = BigInt(startMs + i * intervalMs);
        price = next;
      }
      return { open, high, low, close, volume, timestamps };
    }

    const demoData = createDemoData();

    // ═══════════════════════════════════════════════════════════════════════
    // Chart Creation
    // ═══════════════════════════════════════════════════════════════════════
    async function createChart(renderer) {
      // Cleanup
      if (workspace) { workspace.dispose(); workspace.free(); workspace = null; }
      if (core) { core.dispose(); core.free(); core = null; }

      // Clear container (keep loading & hud)
      Array.from(container.children).forEach(el => {
        if (el.id !== 'loading' && el.id !== 'hud') el.remove();
      });

      loading.textContent = `Loading ${renderer}...`;
      loading.style.display = 'flex';
      errorBanner.style.display = 'none';

      try {
        // Create workspace
        const root = document.createElement('div');
        root.id = 'workspace-root';
        root.style.cssText = 'position:absolute;inset:0;overflow:hidden;';
        container.appendChild(root);

        workspace = new ChartWorkspace('workspace-root');
        const paneId = workspace.root_pane_id();
        const hostId = workspace.pane_host_id(paneId);

        // Create chart
        core = await RayCore.create_chart(hostId, {
          renderer,
          autoRender: true,
          theme: isDark ? 'dark' : 'light',
        });

        currentRenderer = core.renderer_name();
        updateBadge(currentRenderer);

        // Load data
        core.set_data_arrays(demoData.open, demoData.high, demoData.low, demoData.close, demoData.volume, demoData.timestamps);
        core.set_chart_type(activeChartType);

        // Events
        core.on('crosshairMove', e => {
          hudPrice.textContent = e.price > 0 ? e.price.toFixed(2) : '';
        });
        core.on('visibleRangeChange', e => {
          const bars = Math.round(e.endBar - e.startBar);
          hudStatus.textContent = `${currentRenderer} · ${bars} bars`;
        });
        core.on('error', e => showError(e.message));

        loading.style.display = 'none';
        hudStatus.textContent = `${currentRenderer} · ${demoData.open.length} bars`;

      } catch (e) {
        console.error(e);
        showError(`Init failed: ${e.message || e}`);
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Theme
    // ═══════════════════════════════════════════════════════════════════════
    $('theme-toggle').onclick = () => {
      isDark = !isDark;
      document.body.classList.toggle('light', !isDark);
      $('theme-toggle').textContent = isDark ? '☀ Light' : '🌙 Dark';
      if (core) core.apply_options({ theme: isDark ? 'dark' : 'light' });
    };

    // ═══════════════════════════════════════════════════════════════════════
    // Chart Type
    // ═══════════════════════════════════════════════════════════════════════
    const chartTypes = { 'chart-candlestick': 'candlestick', 'chart-ohlc': 'ohlc', 'chart-line': 'line', 'chart-area': 'area' };
    Object.entries(chartTypes).forEach(([id, type]) => {
      $(id).onclick = () => {
        activeChartType = type;
        Object.keys(chartTypes).forEach(k => $(k).classList.toggle('active', k === id));
        if (core) core.set_chart_type(type);
      };
    });

    // ═══════════════════════════════════════════════════════════════════════
    // Drawing Tools
    // ═══════════════════════════════════════════════════════════════════════
    const drawTools = {
      'draw-trendline': 'trend_line',
      'draw-hline': 'horizontal_line',
      'draw-vline': 'vertical_line',
      'draw-ray': 'ray',
      'draw-rectangle': 'rectangle',
      'draw-fibonacci': 'fibonacci',
      'draw-brush': 'brush',
    };

    Object.entries(drawTools).forEach(([id, tool]) => {
      $(id).onclick = () => {
        const newTool = activeDrawTool === tool ? 'none' : tool;
        activeDrawTool = newTool;
        Object.keys(drawTools).forEach(k => $(k).classList.toggle('active', drawTools[k] === newTool));
        if (core) core.set_drawing_tool(newTool);
      };
    });

    $('draw-clear').onclick = () => { if (core) core.clear_drawings(); };

    // ═══════════════════════════════════════════════════════════════════════
    // Keyboard
    // ═══════════════════════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
      if (!core) return;
      const handled = core.on_key_down(e.key, e.ctrlKey, e.shiftKey, e.altKey);
      if (e.key === 'Escape') {
        core.set_drawing_tool('none');
        activeDrawTool = 'none';
        Object.keys(drawTools).forEach(k => $(k).classList.remove('active'));
      }
      if (handled) e.preventDefault();
    });

    // ═══════════════════════════════════════════════════════════════════════
    // Studies (Overlay)
    // ═══════════════════════════════════════════════════════════════════════
    const studies = {};
    const studyColors = {
      sma: [0.231, 0.510, 0.965, 1.0],
      ema: [1.0, 0.627, 0.0, 1.0],
      bollinger: [[0.231, 0.510, 0.965, 1.0], [0.5, 0.5, 0.5, 0.8], [0.5, 0.5, 0.5, 0.8]],
      vwap: [0.133, 0.773, 0.369, 1.0],
    };

    function toggleStudy(type) {
      if (!core) return;
      if (!studies[type]) {
        const id = core.create_study(type);
        if (!id) return;
        
        if (type === 'bollinger') {
          const seriesIds = [];
          for (let i = 0; i < 3; i++) {
            const out = core.get_study_output(id, i);
            if (!out) continue;
            const c = studyColors.bollinger[i];
            const sid = core.add_line_series(c[0], c[1], c[2], c[3], i === 0 ? 2 : 1, 'solid');
            core.set_series_data(sid, out.values, out.timestamps);
            seriesIds.push(sid);
          }
          studies[type] = { id, seriesIds, visible: true };
        } else {
          const out = core.get_study_output(id, 0);
          if (!out) return;
          const c = studyColors[type];
          const sid = core.add_line_series(c[0], c[1], c[2], c[3], 2, 'solid');
          core.set_series_data(sid, out.values, out.timestamps);
          studies[type] = { id, seriesId: sid, visible: true };
        }
      } else {
        const s = studies[type];
        s.visible = !s.visible;
        if (s.seriesIds) s.seriesIds.forEach(sid => core.set_series_visible(sid, s.visible));
        else core.set_series_visible(s.seriesId, s.visible);
      }
      const btn = $(`${type}-toggle`);
      if (btn) btn.classList.toggle('active', studies[type]?.visible);
    }

    ['sma', 'ema', 'bollinger', 'vwap'].forEach(t => {
      const btn = $(`${t}-toggle`);
      if (btn) btn.onclick = () => toggleStudy(t);
    });

    // ═══════════════════════════════════════════════════════════════════════
    // Indicator Panes
    // ═══════════════════════════════════════════════════════════════════════
    const panes = {};

    function togglePane(type) {
      if (!core) return;
      if (panes[type]) {
        core.remove_indicator_pane(panes[type].paneId);
        if (panes[type].studyId) core.remove_study(panes[type].studyId);
        delete panes[type];
      } else {
        const studyId = core.create_study(type);
        if (!studyId) return;
        const paneId = core.add_indicator_pane(studyId, type, 100);
        if (!paneId) { core.remove_study(studyId); return; }
        panes[type] = { studyId, paneId };
      }
      $(`${type}-pane-btn`)?.classList.toggle('active', !!panes[type]);
    }

    $('rsi-pane-btn').onclick = () => togglePane('rsi');
    $('macd-pane-btn').onclick = () => togglePane('macd');

    // ═══════════════════════════════════════════════════════════════════════
    // Live Streaming
    // ═══════════════════════════════════════════════════════════════════════
    let lastTs = demoData.timestamps[demoData.timestamps.length - 1];
    let lastClose = demoData.close[demoData.close.length - 1];
    let barOpen = lastClose;

    function tick() {
      if (!core) return;
      const change = (Math.random() - 0.48) * lastClose * 0.003;
      const newClose = lastClose + change;
      const now = BigInt(Date.now());
      if (Number(now - lastTs) >= 3000) {
        lastTs = now;
        barOpen = lastClose;
      }
      core.upsert_bar(lastTs, barOpen, Math.max(newClose, barOpen) + Math.abs(change) * 0.5,
                      Math.min(newClose, barOpen) - Math.abs(change) * 0.5, newClose, 100 + Math.random() * 500);
      lastClose = newClose;
    }

    $('stream-toggle').onclick = () => {
      if (streamInterval) {
        clearInterval(streamInterval);
        streamInterval = null;
        $('stream-toggle').textContent = '▶ Live';
        $('stream-toggle').classList.remove('active');
      } else {
        streamInterval = setInterval(tick, 200);
        $('stream-toggle').textContent = '⏸ Live';
        $('stream-toggle').classList.add('active');
      }
    };

    $('autoscroll-toggle').onclick = () => {
      const enabled = !$('autoscroll-toggle').classList.contains('active');
      $('autoscroll-toggle').classList.toggle('active', !enabled);
      if (core) core.set_auto_scroll(!enabled ? false : true);
      // Fix: invert because we're toggling
      $('autoscroll-toggle').classList.toggle('active', enabled);
      if (core) core.set_auto_scroll(enabled);
    };

    // ═══════════════════════════════════════════════════════════════════════
    // Boot
    // ═══════════════════════════════════════════════════════════════════════
    async function boot() {
      try {
        await init();
        
        // Renderer buttons
        const renderers = RayCore.get_supported_renderers();
        renderers.forEach(r => {
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.textContent = r === 'webgpu' ? 'WebGPU' : 'Canvas2D';
          btn.onclick = () => {
            if (currentRenderer !== r) createChart(r);
          };
          rendererGroup.appendChild(btn);
        });

        // Start with WebGPU if available
        await createChart(renderers.includes('webgpu') ? 'webgpu' : 'canvas2d');

      } catch (e) {
        console.error(e);
        showError(`Init failed: ${e.message || e}`);
      }
    }

    boot();
  </script>
</body>
</html>
