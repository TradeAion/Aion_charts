<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chart Core — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e11;
      color: #ccc;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 8px 16px;
      background: #16161a;
      border-bottom: 1px solid #2a2a30;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; color: #e0e0e0; font-weight: 600; }
    #renderer-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1a3a2a;
      color: #1abc9c;
      border: 1px solid #1abc9c44;
    }
    #renderer-badge.canvas2d {
      background: #1a2a3a;
      color: #4a9eff;
      border-color: #4a9eff44;
    }
    .toggle-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      background: #222228;
      color: #aaa;
      border: 1px solid #3a3a44;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn:hover { background: #2a2a34; color: #ddd; }
    .toggle-btn:disabled { opacity: 0.4; cursor: default; }
    .toggle-btn.active {
      background: #1a3a2a;
      color: #1abc9c;
      border-color: #1abc9c44;
    }
    .toggle-group {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    /* The container — RayCore creates canvases inside it */
    #chart-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    #hud {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 11px;
      color: #555;
      pointer-events: none;
      line-height: 1.6;
      z-index: 10;
    }
    #error-banner {
      display: none;
      background: #2a1010;
      color: #ff6b6b;
      padding: 10px 16px;
      font-size: 13px;
      border-bottom: 1px solid #5a2020;
      flex-shrink: 0;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e11dd;
      font-size: 14px;
      color: #666;
      letter-spacing: 0.05em;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="error-banner"></div>
    <header>
      <h1>Chart Core</h1>
      <span id="renderer-badge">…</span>
      <div class="toggle-group" id="toggle-group"></div>
    </header>

  <div id="chart-container">
    <div id="loading">Initializing…</div>
    <div id="hud"></div>
  </div>

  <script type="module">
    import init, { RayCore } from '../pkg/raycore_wasm.js';

    const errorBanner = document.getElementById('error-banner');
    const loading     = document.getElementById('loading');
    const hud         = document.getElementById('hud');
    const badge       = document.getElementById('renderer-badge');
    const toggleGroup = document.getElementById('toggle-group');
    const container   = document.getElementById('chart-container');

    function showError(msg) {
      errorBanner.textContent = 'Error: ' + msg;
      errorBanner.style.display = 'block';
      loading.style.display = 'none';
    }

    let core = null;
    let rafId = 0;
    let currentRenderer = null;

    function updateBadge(rName) {
      badge.textContent = rName === 'webgpu' ? 'WebGPU' : 'Canvas 2D';
      badge.className = rName === 'webgpu' ? 'webgpu' : 'canvas2d';
    }

    function updateToggleButtons(active) {
      toggleGroup.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.renderer === active);
      });
    }

    async function createChart(renderer) {
      // Tear down previous instance
      if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
      if (core) { core.dispose(); core.free(); core = null; }

      // Clear container DOM (RayCore appends its own elements)
      // Keep #loading and #hud
      const keep = new Set(['loading', 'hud']);
      Array.from(container.children).forEach(el => {
        if (!keep.has(el.id)) el.remove();
      });

      loading.textContent = 'Switching to ' + renderer + '…';
      loading.style.display = 'flex';
      errorBanner.style.display = 'none';

      try {
        core = await RayCore.create_with('chart-container', renderer);
        currentRenderer = core.renderer_name();
        updateBadge(currentRenderer);
        updateToggleButtons(currentRenderer);

        core.demo_mode();
        loading.style.display = 'none';
        hud.textContent = currentRenderer + ' | 600 bars | dpr=' + (window.devicePixelRatio||1).toFixed(1);

        function frame() {
          rafId = requestAnimationFrame(frame);
          try { core.render(); } catch(e) {
            console.error('Render error:', e);
          }
        }
        rafId = requestAnimationFrame(frame);
      } catch(e) {
        console.error(e);
        showError('Init failed (' + renderer + '): ' + (e.message || e));
      }
    }

    async function boot() {
      try {
        await init();

        // Build toggle buttons from supported renderers
        const renderers = RayCore.get_supported_renderers();
        const labels = { canvas2d: 'Canvas 2D', webgpu: 'WebGPU' };
        for (const r of renderers) {
          const btn = document.createElement('button');
          btn.className = 'toggle-btn';
          btn.dataset.renderer = r;
          btn.textContent = labels[r] || r;
          btn.addEventListener('click', () => {
            if (currentRenderer === r) return;
            createChart(r);
          });
          toggleGroup.appendChild(btn);
        }

        // Start with the best available renderer
        const preferred = renderers.includes('webgpu') ? 'webgpu' : 'canvas2d';
        await createChart(preferred);

      } catch(e) {
        console.error(e);
        showError('Init failed: ' + (e.message || e));
      }
    }

    boot();
  </script>
</body>
</html>
