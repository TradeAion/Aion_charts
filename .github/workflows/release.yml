# RayCharts Release Workflow
# Triggered manually or on version tags
#
# Creates:
# - GitHub Release with changelog
# - WASM package artifact
# - Native library builds

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Build Release Artifacts
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: raycore-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: raycore-windows-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: raycore-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: raycore-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/libraycore*
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Build WASM Package
  # ═══════════════════════════════════════════════════════════════════════════
  wasm:
    name: WASM Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: wasm-pack build --target web --release
        working-directory: wasm

      - name: Package WASM
        run: |
          cd wasm/pkg
          tar -czvf ../../raycore-wasm.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raycore-wasm
          path: raycore-wasm.tar.gz
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs: [build, wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
