name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # rust-toolchain.toml pins the Windows MSVC host for local development; on Linux runners the
  # plain stable toolchain (installed below) must win instead.
  RUSTUP_TOOLCHAIN: stable

jobs:
  rust:
    name: Rust (fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (native, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: clippy (wasm32)
        run: cargo clippy -p aion_wasm --target wasm32-unknown-unknown -- -D warnings
      - name: tests (includes golden-image regression)
        run: cargo test --workspace
      - name: perf gate (report-only; AION_PERF_STRICT=1 makes it a hard gate)
        run: cargo run -p aion_native --example perf_gate --release

  package:
    name: TypeScript package (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install package deps
        working-directory: packages/charts
        run: npm ci
      - name: Lint
        working-directory: packages/charts
        run: npm run lint
      - name: Build (wasm + bundle + types)
        working-directory: packages/charts
        run: npm run build
      - name: Typecheck
        working-directory: packages/charts
        run: npm run typecheck

  browser:
    name: Browser runtime & parity (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm for the demo
        run: wasm-pack build crates/aion_wasm --target web --out-dir ../../examples/web_demo/pkg
      - name: Install demo deps
        working-directory: examples/web_demo
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: examples/web_demo
        run: npx playwright install --with-deps chromium
      - name: Run browser suite
        working-directory: examples/web_demo
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: examples/web_demo/playwright-report/
          retention-days: 7
